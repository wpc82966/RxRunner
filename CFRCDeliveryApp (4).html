const haversine=(la1,lo1,la2,lo2)=>{const R=3958.8,r=d=>d*Math.PI/180,a=Math.sin(r(la2-la1)/2)**2+Math.cos(r(la1))*Math.cos(r(la2))*Math.sin(r(lo2-lo1)/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));};
const fmtT=s=>[Math.floor(s/3600),Math.floor((s%3600)/60),s%60].map(v=>String(v).padStart(2,'0')).join(':');
const fmtDT=ts=>ts?new Date(ts).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
const fmtD=ts=>ts?new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—';
const cur=n=>`$${Number(n||0).toFixed(2)}`;
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const fmtNDC=n=>n?`${n.slice(0,5)}-${n.slice(5,9)}-${n.slice(9)}`:'';
const todayISO=()=>new Date().toISOString().slice(0,10);
const isSecure=()=>window.isSecureContext||window.location.protocol==='https:'||window.location.hostname==='localhost';

  const rcvdBy=log.form?.rcvdBy||log.rcvdBy||'—';
  const lot=log.form?.lot||log.lot||'—';

  <body>
  <button class="no-print" onclick="window.print()" style="margin-bottom:16px;padding:10px 20px;background:#1B2B5E;color:white;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;">🖨 Print This Report</button>
  <button class="no-print" onclick="window.close()" style="margin-bottom:16px;margin-left:8px;padding:10px 20px;background:#f1f5f9;color:#475569;border:none;border-radius:6px;font-size:13px;cursor:pointer;">Close</button>
  <div class="header"><h1>RxRunner — Central Florida Rheumatology Consultants</h1><p>Cold Chain Transport Verification Report — Chain of Custody Record</p></div>

  <div class="section"><div class="section-title">Delivery Record</div><div class="grid">
    <div class="field"><div class="field-label">Log ID</div><div class="field-value" style="font-family:monospace;font-size:11px;">${log.id}</div></div>

    <table><thead><tr><th>Drug Name</th><th>NDC</th><th>Qty</th><th>Lot #</th></tr></thead><tbody>${drugsHtml}</tbody></table>

    <div><div class="field-label">Arrival Temp (°F)</div><div style="margin-top:4px;padding:8px 12px;border-radius:6px;background:${status==='pending'?'#f8fafc':excursion?'#fef2f2':'#f0fdf4'};border:1px solid ${status==='pending'?'#e2e8f0':excursion?'#fca5a5':'#86efac'};color:${status==='pending'?'#94a3b8':excursion?'#991b1b':'#065f46'};font-weight:700;font-size:16px;">${status==='pending'?'Pending':''+arrTemp+'°F'}</div></div>
  </div>
  <div style="margin-top:10px;padding:8px 12px;border-radius:6px;background:${excursion?'#fef2f2':'#f0fdf4'};border:1px solid ${excursion?'#fca5a5':'#86efac'};">
    <span style="font-weight:700;color:${excursion?'#991b1b':'#065f46'};">${excursion?'⚠ EXCURSION DETECTED':'✓ No Temperature Excursion'}</span>
    <span style="font-size:11px;color:#64748b;margin-left:12px;">Acceptable range: 36°F–46°F (refrigerated) or ≤77°F (room temp)</span>
  </div>
  ${notes?`<div style="margin-top:10px;"><div class="field-label">Notes</div><div style="margin-top:4px;color:#475569;">${notes}</div></div>`:''}
  </div>
  <div class="section"><div class="section-title">Chain of Custody Signatures</div><div class="grid">
    ${sigBlock('Dispensing Staff Signature — '+origin,pickupSig)}
    ${sigBlock('Receiver Signature — '+dest+' (Received By: '+rcvdBy+')',deliverySig)}

  </div>
  <div class="footer"><span>RxRunner Cold Chain Log · Generated ${new Date().toLocaleString()}</span><span>CONFIDENTIAL — For internal use and regulatory compliance only</span></div></body></html>`;

function exportLogsCSV(logs){
  const header=['Log ID','Status','Timestamp','Type','Origin','Destination','Drug Name','NDC','Lot','Exp Date','Qty','Dep Temp (°F)','Arr Temp (°F)','Excursion','Received By','Notes'];

// SIGNATURE PAD
// ══════════════════════════════════════════════════════
function SigPad({label,onSave,resetKey=0}){
  const ref=useRef(null),dn=useRef(false);
  const[has,setHas]=useState(false),[saved,setSaved]=useState(false);
  useEffect(()=>{if(ref.current)ref.current.getContext('2d').clearRect(0,0,600,160);setHas(false);setSaved(false);},[resetKey]);
  const pt=(e,c)=>{const r=c.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height,t=e.touches?e.touches[0]:e;return[(t.clientX-r.left)*sx,(t.clientY-r.top)*sy];};
  const down=e=>{e.preventDefault();dn.current=true;const c=ref.current,ctx=c.getContext('2d'),[x,y]=pt(e,c);ctx.beginPath();ctx.moveTo(x,y);};
  const move=e=>{e.preventDefault();if(!dn.current)return;const c=ref.current,ctx=c.getContext('2d'),[x,y]=pt(e,c);ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle='#1B2B5E';ctx.lineTo(x,y);ctx.stroke();ctx.beginPath();ctx.moveTo(x,y);setHas(true);setSaved(false);};
  const up=()=>{dn.current=false;};
  const clear=()=>{ref.current.getContext('2d').clearRect(0,0,600,160);setHas(false);setSaved(false);};
  const save=()=>{if(has&&onSave){onSave(ref.current.toDataURL('image/png'));setSaved(true);}};
  return(
    <div style={{marginTop:8}}>
      {label&&<div style={{fontSize:12,fontWeight:600,color:'#475569',marginBottom:5}}>{label}</div>}
      <div style={{border:`1.5px solid ${saved?'#86EFAC':'#CBD5E1'}`,borderRadius:10,background:'#FAFBFF',position:'relative',overflow:'hidden'}}>
        <canvas ref={ref} width={600} height={160} style={{width:'100%',height:110,display:'block',touchAction:'none',cursor:'crosshair'}}
          onMouseDown={down} onMouseMove={move} onMouseUp={up} onMouseLeave={up}
          onTouchStart={down} onTouchMove={move} onTouchEnd={up}/>
        {!has&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}><span style={{color:'#94A3B8',fontSize:12,fontStyle:'italic'}}>Sign here with finger or mouse</span></div>}
      </div>
      <div style={{display:'flex',gap:8,marginTop:6}}>
        <button onClick={clear} style={S.btnSm}>Clear</button>
        <button onClick={save} disabled={!has} style={{...S.btnSm,flex:2,background:has?(saved?'#059669':'#1B2B5E'):'#E2E8F0',color:has?'white':'#94A3B8',border:'none',fontWeight:600}}>
          {saved?'✓ Signature Saved':has?'Save Signature':'Draw to Sign'}
        </button>
      </div>
    </div>
  );
}

// DRUG SEARCH — shows ALL 42 drugs, no slice limit
// ══════════════════════════════════════════════════════
function DrugSearch({value,ndc,onChange,onClear}){
  const[query,setQuery]=useState(value||'');
  const[open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{setQuery(value||'');},[value]);
  // Show ALL drugs when empty, ALL matches when typing (no slice limit)
  const filtered=query.trim().length===0
    ?DRUG_MASTER
    :DRUG_MASTER.filter(d=>
        d.name.toLowerCase().includes(query.toLowerCase())||
        d.ndc.includes(query.replace(/-/g,''))||
        d.mfr.toLowerCase().includes(query.toLowerCase())
      );
  const select=d=>{onChange(d);setQuery(d.name);setOpen(false);};
  const clear=()=>{setQuery('');onChange(null);onClear&&onClear();};
  const hl=(text,q)=>{if(!q.trim())return text;const i=text.toLowerCase().indexOf(q.toLowerCase());if(i===-1)return text;return<>{text.slice(0,i)}<mark style={{background:'#FEF08A',borderRadius:2,padding:'0 1px'}}>{text.slice(i,i+q.length)}</mark>{text.slice(i+q.length)}</>;};
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);},[]);
  return(
    <div ref={ref} style={{position:'relative'}}>
      <div style={{position:'relative'}}>
        <input value={query} onChange={e=>{setQuery(e.target.value);onChange(null);setOpen(true);}} onFocus={()=>setOpen(true)}
          placeholder="Search all 42 drugs — name, NDC, or manufacturer…"
          style={{...S.input,paddingRight:36,background:value?'#F0FDF4':'white',borderColor:value?'#86EFAC':'#CBD5E1'}}/>
        {(query||value)&&<button onClick={clear} style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'#94A3B8',cursor:'pointer',fontSize:16,padding:2}}>✕</button>}
      </div>
      {open&&filtered.length>0&&(
        <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,background:'white',borderRadius:12,boxShadow:'0 8px 24px rgba(0,0,0,0.15)',zIndex:999,maxHeight:280,overflowY:'auto',border:'1px solid #E2E8F0'}}>
          {query.trim().length===0&&<div style={{padding:'8px 14px 4px',fontSize:10,fontWeight:700,color:'#94A3B8',textTransform:'uppercase',letterSpacing:'0.06em',position:'sticky',top:0,background:'white',borderBottom:'1px solid #F1F5F9'}}>All {DRUG_MASTER.length} Drugs — scroll or type to filter</div>}
          {filtered.map(d=>(
            <div key={d.ndc} onClick={()=>select(d)} style={{padding:'10px 14px',cursor:'pointer',borderBottom:'1px solid #F8FAFC'}}
              onMouseEnter={e=>e.currentTarget.style.background='#F0F9FF'}
              onMouseLeave={e=>e.currentTarget.style.background='white'}>
              <div style={{fontSize:13,fontWeight:600,color:'#1E293B'}}>{hl(d.name,query)}</div>
              <div style={{display:'flex',gap:10,marginTop:2}}>
                <span style={{fontSize:11,color:'#64748B',fontFamily:'monospace'}}>{fmtNDC(d.ndc)}</span>
                <span style={{fontSize:11,color:'#94A3B8'}}>{d.mfr}</span>
              </div>
            </div>
          ))}
        </div>
      )}
      {value&&ndc&&(
        <div style={{marginTop:5,display:'flex',gap:8,alignItems:'center'}}>
          <div style={{fontSize:11,background:'#F0FDF4',border:'1px solid #86EFAC',borderRadius:6,padding:'3px 8px',color:'#065F46',fontFamily:'monospace',fontWeight:600}}>NDC: {fmtNDC(ndc)}</div>
          {DRUG_MASTER.find(d=>d.ndc===ndc)?.mfr&&<div style={{fontSize:11,color:'#64748B'}}>{DRUG_MASTER.find(d=>d.ndc===ndc).mfr}</div>}
        </div>
      )}
    </div>
  );
}

      {notSecure&&!isTracking&&<div style={{background:'#F5F3FF',border:'1px solid #DDD6FE',padding:'10px 16px',margin:'14px 14px 0',borderRadius:10}}>
        <div style={{fontSize:12,fontWeight:700,color:'#5B21B6',marginBottom:3}}>📍 No GPS — Time-Only Mode</div>
        <div style={{fontSize:11,color:'#6D28D9',lineHeight:1.5}}>Running as local file. GPS requires HTTPS hosting. Timer tracks your hours accurately. You can enter mileage manually when you end your session.</div>
      </div>}
      <div style={{padding:'14px'}}>
        <div style={S.card}>
          <div style={{textAlign:'center',padding:'18px 0 22px'}}>
            <div style={{fontSize:58,fontWeight:900,color:isTracking?'#1B2B5E':'#CBD5E1',fontVariantNumeric:'tabular-nums',letterSpacing:'-0.03em',lineHeight:1}}>{fmtT(elapsed)}</div>
            <div style={{fontSize:11,color:'#94A3B8',marginTop:8,textTransform:'uppercase',letterSpacing:'0.06em'}}>Elapsed Time</div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
            <div style={{background:'#F8FAFC',borderRadius:10,padding:'14px',textAlign:'center'}}>
              <div style={{fontSize:24,fontWeight:800,color:'#1B2B5E'}}>{totalMiles.toFixed(2)}</div>
              <div style={{fontSize:10,color:'#94A3B8',marginTop:3,textTransform:'uppercase'}}>{timeOnlyMode?'Miles (manual)':'Miles (GPS)'}</div>
            </div>
            <div style={{background:'#F8FAFC',borderRadius:10,padding:'14px',textAlign:'center'}}>
              <div style={{fontSize:24,fontWeight:800,color:'#059669'}}>{cur((elapsed/3600)*HOURLY_RATE+totalMiles*MILE_RATE)}</div>
              <div style={{fontSize:10,color:'#94A3B8',marginTop:3,textTransform:'uppercase'}}>Est. Earn</div>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,background:'#F8FAFC',borderRadius:8,padding:'10px 12px',marginBottom:16}}>
            <div style={{width:9,height:9,borderRadius:'50%',background:gc[timeOnlyMode?'timeonly':gpsStatus],flexShrink:0}}/>
            <div style={{fontSize:12,color:gc[timeOnlyMode?'timeonly':gpsStatus],fontWeight:500,flex:1}}>{gl[timeOnlyMode?'timeonly':gpsStatus]}</div>
            {isTracking&&sessionStart&&<div style={{fontSize:11,color:'#94A3B8'}}>since {new Date(sessionStart).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</div>}
          </div>
          {!isTracking?(
            <div>
              <button onClick={()=>onStart(false)} style={{...S.btnP,background:'linear-gradient(135deg,#059669,#047857)',boxShadow:'0 4px 16px rgba(5,150,105,0.35)',marginBottom:8}}>▶  Start Session {notSecure?'(Time-Only)':'(GPS)'}</button>
              {!notSecure&&<button onClick={()=>onStart(true)} style={{...S.btnP,background:'linear-gradient(135deg,#6D28D9,#4C1D95)',fontSize:13}}>▶  Start Time-Only (no GPS)</button>}
            </div>
          ):(
            <div>
              {showManualMiles&&(
                <div style={{background:'#F5F3FF',borderRadius:10,padding:'12px',marginBottom:10}}>
                  <div style={{fontSize:12,color:'#5B21B6',fontWeight:600,marginBottom:8}}>Enter mileage (odometer or estimate):</div>
                  <input type="number" value={manualMiles} onChange={e=>setManualMiles(e.target.value)} placeholder="e.g. 47.3" style={{...S.input,marginBottom:8}}/>
                  <button onClick={()=>onEnd(parseFloat(manualMiles)||0)} style={{...S.btnP,background:'#DC2626',fontSize:13}}>■  End Session & Save</button>
                </div>
              )}
              {!showManualMiles&&<button onClick={()=>timeOnlyMode?setShowManualMiles(true):onEnd(null)} style={{...S.btnP,background:'linear-gradient(135deg,#DC2626,#B91C1C)',boxShadow:'0 4px 16px rgba(220,38,38,0.35)'}}>■  End Session</button>}
            </div>
          )}
          <div style={{fontSize:11,color:'#94A3B8',textAlign:'center',marginTop:8}}>$25.00/hr + $0.725/mi · Timer uses wall-clock (accurate when tab is backgrounded)</div>
        </div>
        {sessions.length>0&&(
          <>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <div style={S.lbl}>Session History</div>
              <button onClick={()=>exportSessionsCSV(sessions)} style={{background:'none',border:'1px solid #CBD5E1',borderRadius:8,padding:'5px 10px',fontSize:11,color:'#475569',cursor:'pointer',fontFamily:'inherit'}}>⬇ Export CSV</button>
            </div>
            {[...sessions].reverse().map(s=>(
              <div key={s.id} style={{background:'white',borderRadius:12,padding:'13px 14px',marginBottom:8,boxShadow:'0 1px 3px rgba(0,0,0,0.05)',display:'flex',alignItems:'center',gap:10}}>
                <div style={{flex:1}}>
                  <div style={{display:'flex',justifyContent:'space-between'}}><span style={{fontSize:13,fontWeight:600,color:'#1E293B'}}>{s.date}</span><span style={{fontSize:13,fontWeight:700,color:'#059669'}}>{cur(s.totalSeconds/3600*HOURLY_RATE+s.totalMiles*MILE_RATE)}</span></div>
                  <div style={{fontSize:11,color:'#94A3B8',marginTop:3}}>{fmtT(s.totalSeconds)} · {s.totalMiles.toFixed(2)} mi{s.timeOnly?' (time-only)':''}</div>
                </div>
                <button onClick={()=>onDel(s.id)} style={{background:'none',border:'none',color:'#FCA5A5',cursor:'pointer',fontSize:17,padding:4}}>✕</button>
              </div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}

// DRUG ROW — reusable multi-drug editor row

function DrugRow({drug,idx,onChange,onRemove,showRemove}){
  return(
    <div style={{background:'#F8FAFC',borderRadius:10,padding:'12px',marginBottom:8,border:'1px solid #E2E8F0'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div style={{fontSize:12,fontWeight:700,color:'#1B2B5E'}}>Drug {idx+1}</div>
        {showRemove&&<button onClick={onRemove} style={{background:'none',border:'none',color:'#EF4444',fontSize:12,cursor:'pointer',fontFamily:'inherit',fontWeight:600}}>Remove</button>}
      </div>
      <FR label="Drug Name & NDC" req>
        <DrugSearch value={drug.drug?.name||''} ndc={drug.drug?.ndc} onChange={d=>onChange('drug',d)} onClear={()=>onChange('drug',null)}/>
      </FR>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginTop:4}}>
        <FR label="Qty" req><TIn value={drug.qty} onChange={v=>onChange('qty',v)} placeholder="e.g. 2"/></FR>
        <FR label="Lot # (opt)"><TIn value={drug.lot} onChange={v=>onChange('lot',v)} placeholder="Lot"/></FR>
        <FR label="Exp Date (opt)"><TIn type="date" value={drug.expDate} onChange={v=>onChange('expDate',v)}/></FR>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
// COLD CHAIN SCREEN
// Tabs: Planned Runs | ⏳ In Progress | Ad-Hoc | History
// ══════════════════════════════════════════════════════
function ColdChainScreen({logs,onSave,onUpdate,onDel,runs}){
  const todayRuns=runs.filter(r=>r.date===todayISO());
  const pendingLogs=logs.filter(l=>l.status==='pending');
  const completeLogs=logs.filter(l=>l.status==='complete');

  const[view,setView]=useState('runs');
  // Run execution state
  const[selRun,setSelRun]=useState(null),[selStop,setSelStop]=useState(null);
  const[phase,setPhase]=useState('pickup'),[form,setForm]=useState({});
  const[sigKey,setSigKey]=useState(0),[runSaved,setRunSaved]=useState(false);
  // Completing a pending log
  const[completingLog,setCompletingLog]=useState(null);
  const[compForm,setCompForm]=useState({arrTemp:'',excursion:'No',rcvdBy:'',deliverySig:null});
  const[compSigKey,setCompSigKey]=useState(0);

  const newBlankDrug=()=>({id:uid(),drug:null,qty:'',lot:'',expDate:''});
  // Ad-hoc state
  const blankAdhoc={origin:LOCS[0],dest:'',drugs:[newBlankDrug()],depTemp:'',pickupSig:null,notes:''};
  const[adhoc,setAdhoc]=useState(blankAdhoc),[adhocSaved,setAdhocSaved]=useState(false),[adhocSigKey,setAdhocSigKey]=useState(0);

  const setF=(k,v)=>setForm(p=>({...p,[k]:v}));
  const setCF=(k,v)=>setCompForm(p=>({...p,[k]:v}));
  const setA=(k,v)=>setAdhoc(p=>({...p,[k]:v}));
  const setDrugField=(idx,field,val)=>setAdhoc(p=>({...p,drugs:p.drugs.map((d,i)=>i===idx?{...d,[field]:val}:d)}));
  const removeDrug=idx=>setAdhoc(p=>({...p,drugs:p.drugs.filter((_,i)=>i!==idx)}));
  const addDrug=()=>setAdhoc(p=>({...p,drugs:[...p.drugs,newBlankDrug()]}));

  // Save pickup phase → pending log
  const saveRunPickup=()=>{
    if(!form.depTemp){alert('Enter departure temperature.');return;}
    if(!form.pickupSig){alert('Dispensing staff must sign before saving.');return;}
    const log={id:uid(),status:'pending',type:'run',runId:selRun.id,runDate:selRun.date,stop:selStop,
      origin:'Orange City (Main)',dest:selStop.location,drugs:selStop.drugs,
      form:{...form},pickupTimestamp:Date.now(),completedTimestamp:null};
    onSave(log);
    setRunSaved(true);setTimeout(()=>{setRunSaved(false);setView('runs');setSelRun(null);setSelStop(null);},2000);
  };
  // Complete delivery (from In Progress)
  const completeLog=()=>{
    if(!compForm.arrTemp){alert('Enter arrival temperature.');return;}
    if(!compForm.rcvdBy){alert('Enter receiver name.');return;}
    if(!compForm.deliverySig){alert('Receiver must sign to complete.');return;}
    onUpdate(completingLog.id,{...compForm,status:'complete',completedTimestamp:Date.now()});
    setCompletingLog(null);setView('inprogress');
  };

  // Save ad-hoc as pending (pickup only)
  const saveAdhocPickup=()=>{
    if(!adhoc.dest){alert('Select a destination.');return;}
    const invalidDrug=adhoc.drugs.find(d=>!d.drug||!d.qty);
    if(invalidDrug){alert('Select a drug and enter quantity for each drug row.');return;}
    if(!adhoc.depTemp){alert('Enter departure temperature.');return;}
    if(!adhoc.pickupSig){alert('Dispensing staff must sign at pickup.');return;}
    const log={id:uid(),status:'pending',type:'adhoc',origin:adhoc.origin,dest:adhoc.dest,
      drugs:adhoc.drugs.map(d=>({name:d.drug.name,ndc:d.drug.ndc,mfr:d.drug.mfr,qty:d.qty,lot:d.lot,expDate:d.expDate})),
      depTemp:adhoc.depTemp,pickupSig:adhoc.pickupSig,notes:adhoc.notes,
      pickupTimestamp:Date.now(),completedTimestamp:null};
    onSave(log);
    setAdhoc(blankAdhoc);setAdhocSaved(true);setAdhocSigKey(k=>k+1);
    setTimeout(()=>{setAdhocSaved(false);setView('inprogress');},2000);
  };

  const startRunStop=(run,stop)=>{setSelRun(run);setSelStop(stop);setPhase('pickup');setForm({depTemp:'',pickupSig:null,lot:'',expDate:'',notes:''});setSigKey(k=>k+1);setView('execute');};
  const openComplete=log=>{setCompletingLog(log);setCompForm({arrTemp:'',excursion:'No',rcvdBy:'',deliverySig:null});setCompSigKey(k=>k+1);setView('completing');};

  const excursionWarning=ex=>ex==='Yes'&&(
    <div style={{background:'#FEF2F2',border:'2px solid #FECACA',borderRadius:10,padding:'12px 14px',marginBottom:12,color:'#991B1B',fontSize:13,fontWeight:700}}>
      ⚠️ TEMPERATURE EXCURSION — Notify CFRC immediately. Do NOT deliver without written authorization.
    </div>
  );

  const tabCounts={runs:todayRuns.length,inprogress:pendingLogs.length,adhoc:null,history:completeLogs.length};
  const tabLabels=[['runs',`Planned (${tabCounts.runs})`],['inprogress',pendingLogs.length>0?`⏳ Pending (${pendingLogs.length})`:'In Progress'],['adhoc','Ad-Hoc'],['history',`History (${completeLogs.length})`]];

  return(
    <div style={{paddingBottom:90}}>
      <div style={{background:'linear-gradient(135deg,#0C4A6E,#0369A1)',padding:'40px 20px 16px',color:'white'}}>
        <div style={{fontSize:10,opacity:0.6,textTransform:'uppercase',letterSpacing:'0.08em'}}>Pharmaceutical Transport</div>
        <div style={{fontSize:24,fontWeight:900,letterSpacing:'-0.02em',marginTop:4}}>Cold Chain Log</div>
        <div style={{display:'flex',gap:6,marginTop:14,flexWrap:'wrap'}}>
          {tabLabels.map(([v,l])=>(
            <button key={v} onClick={()=>{setView(v);setSelRun(null);setSelStop(null);setCompletingLog(null);}} style={{...S.pill(view===v||view==='execute'&&v==='runs'||view==='completing'&&v==='inprogress'),fontSize:11}}>{l}</button>
          ))}
        </div>
      </div>

      {/* ─── PLANNED RUNS ─── */}
      {view==='runs'&&(
        <div style={{padding:'14px'}}>
          {todayRuns.length===0
            ?<div style={{textAlign:'center',padding:'50px 20px',color:'#94A3B8'}}>
                <div style={{fontSize:36,marginBottom:12}}>📦</div>
                <div style={{fontSize:14,fontWeight:600,marginBottom:6}}>No runs planned today</div>
                <div style={{fontSize:12}}>Drug Manager can upload an Excel file or create runs manually.</div>
                <button onClick={()=>setView('adhoc')} style={{marginTop:14,background:'#0369A1',border:'none',borderRadius:10,color:'white',fontSize:13,fontWeight:600,padding:'10px 20px',cursor:'pointer',fontFamily:'inherit'}}>Ad-Hoc Entry</button>
              </div>
            :todayRuns.map(run=>(
              <div key={run.id} style={S.card}>
                <div style={{...S.hdiv,display:'flex',justifyContent:'space-between'}}>
                  <span>Run: {new Date(run.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
                  <span style={{fontWeight:400,fontSize:12,color:'#94A3B8'}}>{run.stops.length} stop{run.stops.length!==1?'s':''}</span>
                </div>
                {run.stops.map((stop,si)=>{
                  const done=logs.some(l=>l.runId===run.id&&l.stop?.location===stop.location);
                  const pending=logs.some(l=>l.runId===run.id&&l.stop?.location===stop.location&&l.status==='pending');
                  return(
                    <div key={si} style={{marginBottom:10,borderRadius:10,border:`1px solid ${done?(pending?'#FDE68A':'#86EFAC'):'#E2E8F0'}`,padding:'12px',background:done?(pending?'#FFFBEB':'#F0FDF4'):'#FAFBFF'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                        <div>
                          <div style={{fontSize:13,fontWeight:700,color:'#1E293B'}}>Stop {si+1}: {stop.location}</div>
                          <div style={{fontSize:11,color:'#64748B',marginTop:2}}>{stop.drugs.length} drug{stop.drugs.length!==1?'s':''}</div>
                        </div>
                        {!done&&<button onClick={()=>startRunStop(run,stop)} style={{background:'#0369A1',border:'none',borderRadius:8,color:'white',fontSize:12,fontWeight:600,padding:'7px 14px',cursor:'pointer',fontFamily:'inherit'}}>Start →</button>}
                        {pending&&<span style={{fontSize:11,fontWeight:700,color:'#D97706',background:'#FEF3C7',padding:'3px 8px',borderRadius:20}}>⏳ Pickup saved</span>}
                        {done&&!pending&&<span style={{fontSize:11,fontWeight:700,color:'#059669',background:'#DCFCE7',padding:'3px 8px',borderRadius:20}}>✓ Complete</span>}
                      </div>
                      {stop.drugs.map((d,di)=>(
                        <div key={di} style={{fontSize:12,color:'#475569',padding:'3px 0',borderTop:di>0?'1px solid #F1F5F9':'none'}}>
                          <span style={{fontWeight:500}}>{d.name}</span>
                          {d.ndc&&<span style={{fontFamily:'monospace',color:'#94A3B8',marginLeft:8,fontSize:11}}>{fmtNDC(d.ndc)}</span>}
                          {d.qty&&<span style={{color:'#94A3B8',marginLeft:8}}>Qty: {d.qty}</span>}
                        </div>
                      ))}
                    </div>
                  );
                })}
              </div>
            ))}
        </div>
      )}

      {/* ─── RUN EXECUTE ─── */}
      {view==='execute'&&selRun&&selStop&&(
        <div style={{padding:'14px'}}>
          {runSaved&&<div style={{background:'#ECFDF5',border:'1px solid #6EE7B7',borderRadius:10,padding:'12px 14px',marginBottom:12,color:'#065F46',fontSize:13,fontWeight:700}}>✓ Pickup saved for {selStop.location} — complete delivery when you arrive</div>}
          <div style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:10,padding:'10px 14px',marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:'#1E40AF',textTransform:'uppercase',letterSpacing:'0.06em'}}>📦 Pickup Verification — Orange City</div>
            <div style={{fontSize:12,color:'#1E40AF',marginTop:3}}>Destination: <strong>{selStop.location}</strong></div>
          </div>
          <div style={S.card}>
            <div style={S.hdiv}>Drugs in This Stop</div>
            {selStop.drugs.map((d,i)=>(
              <div key={i} style={{padding:'8px 0',borderBottom:'1px solid #F1F5F9'}}><div style={{fontSize:13,fontWeight:600,color:'#1E293B'}}>{d.name}</div><div style={{fontSize:11,color:'#94A3B8',fontFamily:'monospace'}}>{fmtNDC(d.ndc)}{d.qty&&` · Qty: ${d.qty}`}</div></div>
            ))}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:12}}>
              <FR label="Lot # (opt)"><TIn value={form.lot||''} onChange={v=>setF('lot',v)} placeholder="Lot #"/></FR>
              <FR label="Exp Date (opt)"><TIn type="date" value={form.expDate||''} onChange={v=>setF('expDate',v)}/></FR>
            </div>
          </div>
          <div style={S.card}>
            <div style={S.hdiv}>Departure Temp & Pickup Signature</div>
            <FR label="Departure Temp (°F)" req><TIn type="number" value={form.depTemp||''} onChange={v=>setF('depTemp',v)} placeholder="e.g. 39.2"/></FR>
            <FR label="Notes"><TIn value={form.notes||''} onChange={v=>setF('notes',v)} placeholder="Observations at pickup"/></FR>
            <SigPad label="Dispensing Staff Signature — Orange City" onSave={sig=>setF('pickupSig',sig)} resetKey={sigKey}/>
            <button onClick={saveRunPickup} style={{...S.btnP,marginTop:16,background:'linear-gradient(135deg,#0C4A6E,#0369A1)'}}>💾 Save Pickup — Complete at Destination</button>
            <div style={{fontSize:11,color:'#94A3B8',textAlign:'center',marginTop:6}}>Saves as "Pending." Go to ⏳ In Progress tab to complete at {selStop.location}.</div>
          </div>
          <button onClick={()=>{setView('runs');setSelRun(null);setSelStop(null);}} style={{...S.btnSm,width:'100%',padding:'12px',textAlign:'center',marginTop:4}}>← Back to Runs</button>
        </div>
      )}

      {/* ─── IN PROGRESS (pending) ─── */}
      {view==='inprogress'&&(
        <div style={{padding:'14px'}}>
          {pendingLogs.length===0
            ?<div style={{textAlign:'center',padding:'60px 20px',color:'#94A3B8'}}>
                <div style={{fontSize:40,marginBottom:12}}>⏳</div>
                <div style={{fontSize:14,fontWeight:600,marginBottom:6}}>No pending logs</div>
                <div style={{fontSize:12}}>Pickup-saved logs appear here. Open at the destination to add arrival temp and receiver signature.</div>
              </div>
            :pendingLogs.map(l=>(
              <div key={l.id} style={{background:'white',borderRadius:12,padding:'14px',marginBottom:10,boxShadow:'0 1px 4px rgba(0,0,0,0.07)',borderLeft:'4px solid #F59E0B'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                  <div>
                    <div style={{fontSize:14,fontWeight:700,color:'#1E293B'}}>{l.dest}</div>
                    <div style={{fontSize:11,color:'#94A3B8',marginTop:2}}>Pickup: {fmtDT(l.pickupTimestamp)} · Dep: {l.form?.depTemp||l.depTemp}°F</div>
                    <div style={{fontSize:11,color:'#94A3B8',marginTop:1}}>{(l.drugs||[]).length} drug{(l.drugs||[]).length!==1?'s':''}: {(l.drugs||[]).map(d=>d.name.split(' ')[0]).join(', ')}</div>
                  </div>
                  <span style={{fontSize:10,fontWeight:700,color:'#D97706',background:'#FEF3C7',padding:'3px 8px',borderRadius:20,whiteSpace:'nowrap'}}>⏳ Pickup Done</span>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button onClick={()=>openComplete(l)} style={{flex:1,background:'#0369A1',border:'none',borderRadius:8,color:'white',fontSize:12,fontWeight:600,padding:'9px',cursor:'pointer',fontFamily:'inherit'}}>✏️ Complete at {l.dest.replace('Kissimmee — ','')}</button>
                  <button onClick={()=>printDeliveryLog(l)} style={{background:'#1B2B5E',border:'none',borderRadius:8,color:'white',fontSize:11,fontWeight:600,padding:'9px 10px',cursor:'pointer',fontFamily:'inherit'}}>🖨</button>
                </div>
              </div>
            ))
          }
        </div>
      )}

      {/* ─── COMPLETING A PENDING LOG ─── */}
      {view==='completing'&&completingLog&&(
        <div style={{padding:'14px'}}>
          {excursionWarning(compForm.excursion)}
          <div style={{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:10,padding:'10px 14px',marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:'#D97706',textTransform:'uppercase',letterSpacing:'0.06em'}}>🏥 Step 2: Delivery Verification</div>
            <div style={{fontSize:12,color:'#92400E',marginTop:3}}>Delivering to: <strong>{completingLog.dest}</strong></div>
          </div>
          <div style={S.card}>
            <div style={S.hdiv}>Drugs</div>
            {(completingLog.drugs||[]).map((d,i)=>(
              <div key={i} style={{padding:'7px 0',borderBottom:'1px solid #F1F5F9'}}><span style={{fontSize:13,fontWeight:600}}>{d.name}</span><span style={{fontSize:11,color:'#94A3B8',marginLeft:8,fontFamily:'monospace'}}>{fmtNDC(d.ndc)}</span>{d.qty&&<span style={{fontSize:11,color:'#94A3B8',marginLeft:8}}>Qty: {d.qty}</span>}</div>
            ))}
          </div>
          <div style={S.card}>
            <div style={S.hdiv}>Arrival Details</div>
            <FR label="Arrival Temp (°F)" req><TIn type="number" value={compForm.arrTemp} onChange={v=>setCF('arrTemp',v)} placeholder="e.g. 40.1"/></FR>
            <FR label="Excursion?">
              <div style={{display:'flex',gap:8}}>
                {['No','Yes'].map(v=>(

            </div>
          )}
          {completeLogs.length===0
            ?<div style={{textAlign:'center',padding:'60px 20px',color:'#94A3B8'}}><div style={{fontSize:40,marginBottom:12}}>🌡</div><div>No completed logs yet</div></div>
            :[...completeLogs].reverse().map(l=>(

                    </div>

                    <div style={{fontSize:11,color:'#94A3B8',marginTop:4}}>{fmtDT(l.pickupTimestamp||l.timestamp)} · Rcvd: {l.form?.rcvdBy||l.rcvdBy}</div>

            ))

        </div>
      )}
    </div>
  );
}

// INVOICE SCREEN
// ══════════════════════════════════════════════════════
function InvoiceScreen({sessions,coldChainLogs,manifests}){
  const[name,setName]=useState('');
  const bw=()=>{const n=new Date(),d=n.getDate(),y=n.getFullYear(),m=n.getMonth();return d<=15?{start:new Date(y,m,1).getTime(),end:new Date(y,m,15,23,59,59).getTime()}:{start:new Date(y,m,16).getTime(),end:new Date(y,m+1,0,23,59,59).getTime()};};
  const[period,setPeriod]=useState(bw);
  const prev=()=>setPeriod(p=>{const s=new Date(p.start);if(s.getDate()===1){const pm=new Date(s.getFullYear(),s.getMonth()-1);return{start:new Date(pm.getFullYear(),pm.getMonth(),16).getTime(),end:new Date(s.getFullYear(),s.getMonth(),0,23,59,59).getTime()};}return{start:new Date(s.getFullYear(),s.getMonth(),1).getTime(),end:new Date(s.getFullYear(),s.getMonth(),15,23,59,59).getTime()};});
  const next=()=>setPeriod(p=>{const e=new Date(p.end);if(e.getDate()===15)return{start:new Date(e.getFullYear(),e.getMonth(),16).getTime(),end:new Date(e.getFullYear(),e.getMonth()+1,0,23,59,59).getTime()};const nm=new Date(e.getFullYear(),e.getMonth()+1);return{start:nm.getTime(),end:new Date(nm.getFullYear(),nm.getMonth(),15,23,59,59).getTime()};});
  const ps=sessions.filter(s=>s.startTime>=period.start&&s.startTime<=period.end);
  const totHrs=ps.reduce((a,s)=>a+s.totalSeconds,0)/3600,totMi=ps.reduce((a,s)=>a+s.totalMiles,0);
  const hPay=totHrs*HOURLY_RATE,mPay=totMi*MILE_RATE,total=hPay+mPay;
  const pc=coldChainLogs.filter(l=>l.status==='complete'&&(l.pickupTimestamp||l.timestamp)>=period.start&&(l.pickupTimestamp||l.timestamp)<=period.end);
  const pm=manifests.filter(m=>m.timestamp>=period.start&&m.timestamp<=period.end);
  const send=()=>{
    const subj=encodeURIComponent(`Biweekly Invoice — ${name||'[Contractor]'} — ${fmtD(period.start)} to ${fmtD(period.end)}`);
    const body=encodeURIComponent(`====================================================\n  INVOICE — CENTRAL FLORIDA RHEUMATOLOGY CONSULTANTS\n====================================================\nContractor:    ${name||'[Full Legal Name]'}\nPay Period:    ${fmtD(period.start)} – ${fmtD(period.end)}\nSubmitted:     ${fmtDT(Date.now())}\n====================================================\nHours:    ${totHrs.toFixed(2)} hrs × $${HOURLY_RATE.toFixed(2)}/hr = ${cur(hPay)}\nMileage:  ${totMi.toFixed(2)} mi  × $${MILE_RATE}/mi  = ${cur(mPay)}\n────────────────────────────────────────────────────\nTOTAL DUE:    ${cur(total)}\n====================================================\nSESSIONS (${ps.length}):\n${ps.map(s=>`  ${s.date} | ${fmtT(s.totalSeconds)} | ${s.totalMiles.toFixed(2)} mi | ${cur(s.totalSeconds/3600*HOURLY_RATE+s.totalMiles*MILE_RATE)}`).join('\n')||'  (none)'}\n\nCold Chain Logs (complete): ${pc.length}\nDelivery Manifests: ${pm.length}\nPayment Method:     ACH Direct Deposit\n====================================================`);
    window.open(`mailto:${BILLING_EMAIL}?subject=${subj}&body=${body}`,'_blank');
  };
  return(
    <div style={{paddingBottom:90}}>
      <div style={{background:'linear-gradient(135deg,#064E3B,#059669)',padding:'40px 20px 20px',color:'white'}}>
        <div style={{fontSize:10,opacity:0.6,textTransform:'uppercase',letterSpacing:'0.08em'}}>Pay Period Report</div>
        <div style={{fontSize:24,fontWeight:900,letterSpacing:'-0.02em',marginTop:4}}>Invoice Generator</div>
      </div>
      <div style={{padding:'14px'}}>
        <div style={S.card}><FR label="Your Full Name"><TIn value={name} onChange={setName} placeholder="Full legal name"/></FR></div>
        <div style={S.card}>
          <div style={{fontSize:12,fontWeight:600,color:'#475569',marginBottom:10}}>Pay Period</div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <button onClick={prev} style={{...S.btnSm,flex:'none',width:38,padding:'9px',fontSize:18,textAlign:'center'}}>‹</button>
            <div style={{flex:1,textAlign:'center',background:'#F8FAFC',borderRadius:10,padding:'11px 8px'}}>
              <div style={{fontSize:13,fontWeight:700,color:'#1E293B'}}>{fmtD(period.start)} – {fmtD(period.end)}</div>
              <div style={{fontSize:11,color:'#94A3B8',marginTop:2}}>{ps.length} session{ps.length!==1?'s':''}</div>
            </div>
            <button onClick={next} style={{...S.btnSm,flex:'none',width:38,padding:'9px',fontSize:18,textAlign:'center'}}>›</button>
          </div>
        </div>
        <div style={S.card}>
          <div style={S.hdiv}>Pay Summary</div>
          {[{l:`Hours — ${totHrs.toFixed(2)} hrs × $${HOURLY_RATE}/hr`,v:cur(hPay)},{l:`Mileage — ${totMi.toFixed(2)} mi × $${MILE_RATE}/mi`,v:cur(mPay)}].map(({l,v})=>(
            <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid #F1F5F9'}}><div style={{fontSize:13,color:'#475569'}}>{l}</div><div style={{fontSize:13,fontWeight:600}}>{v}</div></div>
          ))}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingTop:12}}>
            <div style={{fontSize:15,fontWeight:700,color:'#064E3B'}}>Total Due</div>
            <div style={{fontSize:28,fontWeight:900,color:'#059669',letterSpacing:'-0.02em'}}>{cur(total)}</div>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:12}}>
          {[{n:ps.length,l:'Sessions',i:'⏱'},{n:pc.length,l:'Cold Chain',i:'🌡'},{n:pm.length,l:'Manifests',i:'📋'}].map(({n,l,i})=>(
            <div key={l} style={{background:'white',borderRadius:10,padding:'13px 8px',textAlign:'center',boxShadow:'0 1px 3px rgba(0,0,0,0.05)'}}><div style={{fontSize:22}}>{i}</div><div style={{fontSize:20,fontWeight:800,color:'#1B2B5E',marginTop:4}}>{n}</div><div style={{fontSize:10,color:'#94A3B8',marginTop:2}}>{l}</div></div>
          ))}
        </div>
        <button onClick={send} disabled={ps.length===0} style={{...S.btnP,background:ps.length>0?'linear-gradient(135deg,#064E3B,#059669)':'#E2E8F0',color:ps.length>0?'white':'#94A3B8',cursor:ps.length>0?'pointer':'default',display:'flex',alignItems:'center',justifyContent:'center',gap:10}}>
          ✉  Submit Invoice via Email
        </button>
        <div style={{fontSize:11,color:'#94A3B8',textAlign:'center',marginTop:7}}>Sends to {BILLING_EMAIL}</div>
      </div>
    </div>
  );
}

// DRUG MANAGER PORTAL — with Excel upload
// ══════════════════════════════════════════════════════
function DrugManagerPortal({runs,onSaveRun,onDelRun,onClose,fbMode}){
  const[authed,setAuthed]=useState(false),[pw,setPw]=useState(''),[pwErr,setPwErr]=useState(false);
  const[view,setView]=useState('list');
  const today=todayISO();
  const[runDate,setRunDate]=useState(today);
  const[stops,setStops]=useState([{id:uid(),location:'',drugs:[{id:uid(),drug:null,qty:'',lot:'',expDate:''}]}]);
  const[saved,setSaved]=useState(false);
  const[xlsxPreview,setXlsxPreview]=useState(null);
  const[xlsxError,setXlsxError]=useState('');
  const[xlsxSaved,setXlsxSaved]=useState(false);

  const login=()=>{if(pw===MGR_PASSWORD){setAuthed(true);setPwErr(false);}else setPwErr(true);};
  const addStop=()=>setStops(p=>[...p,{id:uid(),location:'',drugs:[{id:uid(),drug:null,qty:'',lot:'',expDate:''}]}]);
  const delStop=id=>setStops(p=>p.filter(s=>s.id!==id));
  const setStop=(id,k,v)=>setStops(p=>p.map(s=>s.id===id?{...s,[k]:v}:s));
  const addDrug=sid=>setStops(p=>p.map(s=>s.id===sid?{...s,drugs:[...s.drugs,{id:uid(),drug:null,qty:'',lot:'',expDate:''}]}:s));
  const delDrug=(sid,did)=>setStops(p=>p.map(s=>s.id===sid?{...s,drugs:s.drugs.filter(d=>d.id!==did)}:s));
  const setDrug=(sid,did,k,v)=>setStops(p=>p.map(s=>s.id===sid?{...s,drugs:s.drugs.map(d=>d.id===did?{...d,[k]:v}:d)}:s));

  const saveRun=()=>{
    if(!runDate){alert('Select a date.');return;}
    if(!stops.every(s=>s.location&&s.drugs.every(d=>d.drug))){alert('Select location and at least one drug for each stop.');return;}
    const run={id:uid(),date:runDate,stops:stops.map(s=>({location:s.location,drugs:s.drugs.map(d=>({name:d.drug.name,ndc:d.drug.ndc,mfr:d.drug.mfr,qty:d.qty,lot:d.lot,expDate:d.expDate}))})),createdAt:Date.now()};
    onSaveRun(run);
    setStops([{id:uid(),location:'',drugs:[{id:uid(),drug:null,qty:'',lot:'',expDate:''}]}]);setRunDate(today);
    setSaved(true);setTimeout(()=>{setSaved(false);setView('list');},2000);
  };

  const handleXLSX=e=>{
    const file=e.target.files[0];if(!file)return;
    setXlsxError('');setXlsxPreview(null);setXlsxSaved(false);
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(ev.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const data=XLSX.utils.sheet_to_json(ws,{defval:'',raw:false});
        // Find header row (skip instruction rows)
        const rows=data.filter(r=>{
          const keys=Object.keys(r).map(k=>k.toLowerCase());
          return !keys.some(k=>k.includes('instruction')||k.includes('cfrc drug'));
        });
        if(!rows.length){setXlsxError('No data rows found. Check the template format.');return;}
        // Group by date + location
        const groups={};
        rows.forEach(r=>{
          const date=(r['Delivery Date']||r['delivery date']||'').trim();
          const loc=(r['Delivery Location']||r['delivery location']||'').trim();
          const drugName=(r['Drug Name']||r['drug name']||'').trim();
          const qty=(r['Qty *REQUIRED*']||r['Qty']||r['qty']||'').trim();
          if(!loc||!drugName)return;
          const key=`${date}||${loc}`;
          if(!groups[key])groups[key]={date:date||today,location:loc,drugs:[]};
          const matchedDrug=DRUG_MASTER.find(d=>d.name.toLowerCase()===drugName.toLowerCase()||d.ndc.replace(/-/g,'')===drugName.replace(/-/g,''));
          groups[key].drugs.push({
            name:drugName,
            ndc:matchedDrug?.ndc||r['NDC']||r['ndc']||'',
            mfr:matchedDrug?.mfr||'',
            qty,
            lot:(r['Lot # (optional)']||r['Lot #']||r['lot']||'').trim(),
            expDate:(r['Exp Date (optional)']||r['Exp Date']||r['exp date']||'').trim()
          });
        });
        const preview=Object.values(groups);
        if(!preview.length){setXlsxError('Could not parse any valid rows. Ensure columns match the template.');return;}
        setXlsxPreview(preview);
      }catch(err){setXlsxError('Error reading file: '+err.message);}
    };
    reader.readAsArrayBuffer(file);
    e.target.value='';
  };

  const saveXLSXRun=()=>{
    if(!xlsxPreview)return;
    // Group stops by date into runs
    const byDate={};
    xlsxPreview.forEach(g=>{
      if(!byDate[g.date])byDate[g.date]=[];
      byDate[g.date].push({location:g.location,drugs:g.drugs});
    });
    Object.entries(byDate).forEach(([date,stops])=>{
      onSaveRun({id:uid(),date,stops,createdAt:Date.now(),source:'xlsx'});
    });
    setXlsxPreview(null);setXlsxSaved(true);setTimeout(()=>{setXlsxSaved(false);setView('list');},2000);
  };

  if(!authed)return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'white',borderRadius:20,padding:28,width:'100%',maxWidth:380,boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
        <div style={{textAlign:'center',marginBottom:24}}><div style={{fontSize:36,marginBottom:8}}>💊</div><div style={{fontSize:20,fontWeight:800,color:'#1B2B5E'}}>Drug Manager Portal</div><div style={{fontSize:12,color:'#94A3B8',marginTop:4}}>CFRC — Authorized Staff Only</div></div>
        <div style={{fontSize:12,color:fbMode?'#059669':'#F59E0B',background:fbMode?'#F0FDF4':'#FFFBEB',border:`1px solid ${fbMode?'#86EFAC':'#FDE68A'}`,borderRadius:8,padding:'8px 12px',marginBottom:12,textAlign:'center'}}>
          {fbMode?'🟢 Firebase Connected — runs sync in real time':'🟡 Offline Mode — runs saved locally only'}
        </div>
        <input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&login()} placeholder="Enter portal password" style={{...S.input,marginBottom:10,borderColor:pwErr?'#EF4444':'#CBD5E1'}}/>
        {pwErr&&<div style={{color:'#DC2626',fontSize:12,marginBottom:10}}>Incorrect password.</div>}
        <button onClick={login} style={{...S.btnP,background:'linear-gradient(135deg,#1B2B5E,#2E4FAF)',marginBottom:10}}>Sign In</button>
        <button onClick={onClose} style={{...S.btnSm,width:'100%',textAlign:'center',padding:'12px'}}>Cancel</button>
      </div>
    </div>
  );

  return(
    <div style={{position:'fixed',inset:0,background:'#EEF2FF',zIndex:1000,overflowY:'auto',maxWidth:480,margin:'0 auto'}}>
      <div style={{background:'linear-gradient(135deg,#064E3B,#059669)',padding:'40px 20px 16px',color:'white',display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div>
          <div style={{fontSize:10,opacity:0.6,textTransform:'uppercase',letterSpacing:'0.08em'}}>CFRC Drug Manager</div>
          <div style={{fontSize:22,fontWeight:900,letterSpacing:'-0.02em',marginTop:4}}>Delivery Run Manager</div>
          <div style={{fontSize:11,opacity:0.7,marginTop:6}}>{fbMode?'🟢 Firebase — real-time sync':'🟡 Local only'}</div>
        </div>
        <button onClick={onClose} style={{background:'rgba(255,255,255,0.2)',border:'none',borderRadius:8,color:'white',fontSize:13,fontWeight:600,padding:'8px 12px',cursor:'pointer',fontFamily:'inherit'}}>✕ Close</button>
      </div>
      <div style={{display:'flex',borderBottom:'1px solid #E2E8F0',background:'white'}}>
        {[['list',`Runs (${runs.length})`],['upload','📊 Upload Excel'],['create','+ Manual']].map(([v,l])=>(
          <button key={v} onClick={()=>setView(v)} style={{flex:1,padding:'12px 4px',border:'none',background:'none',cursor:'pointer',fontSize:12,fontWeight:view===v?700:500,color:view===v?'#059669':'#64748B',borderBottom:view===v?'2.5px solid #059669':'2.5px solid transparent',fontFamily:'inherit'}}>{l}</button>
        ))}
      </div>

      {/* All Runs */}
      {view==='list'&&(
        <div style={{padding:'14px',paddingBottom:40}}>
          {runs.length===0
            ?<div style={{textAlign:'center',padding:'50px 20px',color:'#94A3B8'}}><div style={{fontSize:36,marginBottom:12}}>📦</div><div style={{fontSize:14}}>No runs yet</div><button onClick={()=>setView('upload')} style={{marginTop:14,background:'#059669',border:'none',borderRadius:10,color:'white',fontSize:13,fontWeight:600,padding:'10px 20px',cursor:'pointer',fontFamily:'inherit'}}>Upload Excel File</button></div>
            :[...runs].reverse().map(r=>(
              <div key={r.id} style={{background:'white',borderRadius:12,padding:'14px',marginBottom:10,boxShadow:'0 1px 3px rgba(0,0,0,0.05)',borderLeft:`3px solid ${r.date===today?'#059669':'#CBD5E1'}`}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',marginBottom:6}}>
                      <div style={{fontSize:13,fontWeight:700,color:'#1E293B'}}>{new Date(r.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div>
                      {r.date===today&&<span style={{fontSize:10,fontWeight:700,background:'#DCFCE7',color:'#059669',padding:'2px 8px',borderRadius:20}}>TODAY</span>}
                      {r.source==='xlsx'&&<span style={{fontSize:10,fontWeight:600,background:'#EFF6FF',color:'#1D4ED8',padding:'2px 8px',borderRadius:20}}>XLSX</span>}
                    </div>
                    {r.stops.map((s,i)=><div key={i} style={{fontSize:12,color:'#475569',marginBottom:3}}><span style={{fontWeight:600}}>Stop {i+1}:</span> {s.location} — {s.drugs.map(d=>d.name.split(' ').slice(0,2).join(' ')).join(', ')}</div>)}
                  </div>
                  <button onClick={()=>onDelRun(r.id)} style={{background:'none',border:'none',color:'#FCA5A5',cursor:'pointer',fontSize:17,padding:4}}>✕</button>
                </div>
              </div>
            ))
          }
        </div>
      )}

      {/* Excel Upload */}
      {view==='upload'&&(
        <div style={{padding:'14px',paddingBottom:60}}>
          {xlsxSaved&&<div style={{background:'#ECFDF5',border:'1px solid #6EE7B7',borderRadius:10,padding:'12px 14px',marginBottom:12,color:'#065F46',fontSize:13,fontWeight:600}}>✓ Runs saved from Excel file{fbMode?' — synced to driver in real time':''}</div>}
          <div style={{...S.card,background:'#F0FDF4',border:'1px solid #86EFAC'}}>
            <div style={{fontSize:13,fontWeight:700,color:'#065F46',marginBottom:8}}>Step 1: Download the Template</div>
            <div style={{fontSize:12,color:'#047857',marginBottom:12,lineHeight:1.5}}>Use the Excel template to enter all drugs and quantities. One row per drug. Rows with the same date + delivery location are grouped into one stop automatically.</div>
            <button onClick={downloadXLSXTemplate} style={{...S.btnP,background:'#059669',fontSize:13}}>⬇ Download Drug Run Template (.xlsx)</button>
          </div>
          <div style={S.card}>
            <div style={{fontSize:13,fontWeight:700,color:'#1B2B5E',marginBottom:8}}>Step 2: Upload Completed File</div>
            <div style={{border:'2px dashed #CBD5E1',borderRadius:10,padding:'24px',textAlign:'center',background:'#F8FAFC',marginBottom:10}}>
              <div style={{fontSize:28,marginBottom:8}}>📊</div>
              <div style={{fontSize:13,color:'#475569',marginBottom:12}}>Select your filled-in Excel file</div>
              <label style={{display:'inline-block',background:'#1B2B5E',color:'white',padding:'10px 20px',borderRadius:8,cursor:'pointer',fontSize:13,fontWeight:600}}>
                Choose .xlsx File
                <input type="file" accept=".xlsx,.xls,.csv" onChange={handleXLSX} style={{display:'none'}}/>
              </label>
            </div>
            {xlsxError&&<div style={{background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:8,padding:'10px 12px',color:'#991B1B',fontSize:12,marginBottom:10}}>{xlsxError}</div>}
          </div>
          {xlsxPreview&&(
            <div style={S.card}>
              <div style={{fontSize:13,fontWeight:700,color:'#1B2B5E',marginBottom:12}}>Step 3: Review & Publish</div>
              {xlsxPreview.map((g,i)=>(
                <div key={i} style={{background:'#F8FAFC',borderRadius:10,padding:'12px',marginBottom:8,border:'1px solid #E2E8F0'}}>
                  <div style={{fontSize:12,fontWeight:700,color:'#1E293B',marginBottom:6}}>{g.location} <span style={{fontWeight:400,color:'#94A3B8'}}>— {g.date}</span></div>
                  {g.drugs.map((d,j)=>(
                    <div key={j} style={{fontSize:12,color:'#475569',padding:'4px 0',borderTop:j>0?'1px solid #F1F5F9':'none'}}>
                      <span style={{fontWeight:500}}>{d.name}</span>
                      {d.qty&&<span style={{color:'#94A3B8',marginLeft:8}}>Qty: {d.qty}</span>}
                      {d.lot&&<span style={{color:'#94A3B8',marginLeft:8}}>Lot: {d.lot}</span>}
                      {!d.ndc&&<span style={{color:'#F59E0B',marginLeft:8,fontSize:11}}>⚠ NDC not matched</span>}
                    </div>
                  ))}
                </div>
              ))}
              <div style={{fontSize:11,color:'#94A3B8',marginBottom:12}}>
                {xlsxPreview.reduce((a,g)=>a+g.drugs.length,0)} drugs across {xlsxPreview.length} stop{xlsxPreview.length!==1?'s':''}
              </div>
              <button onClick={saveXLSXRun} style={{...S.btnP,background:'linear-gradient(135deg,#064E3B,#059669)'}}>📤 Publish to Driver</button>
              <button onClick={()=>setXlsxPreview(null)} style={{...S.btnSm,width:'100%',marginTop:8,padding:'12px',textAlign:'center'}}>Cancel — Re-upload</button>
            </div>
          )}
        </div>
      )}

      {/* Manual Create */}
      {view==='create'&&(
        <div style={{padding:'14px',paddingBottom:60}}>
          {saved&&<div style={{background:'#ECFDF5',border:'1px solid #6EE7B7',borderRadius:10,padding:'12px 14px',marginBottom:12,color:'#065F46',fontSize:13,fontWeight:600}}>✓ Run saved — driver sees it immediately</div>}
          <div style={S.card}><FR label="Delivery Date" req><input type="date" value={runDate} onChange={e=>setRunDate(e.target.value)} style={S.input}/></FR></div>
          {stops.map((stop,si)=>(
            <div key={stop.id} style={{...S.card,border:'1px solid #E2E8F0'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <div style={{fontSize:13,fontWeight:700,color:'#1B2B5E'}}>Stop {si+1}</div>
                {stops.length>1&&<button onClick={()=>delStop(stop.id)} style={{background:'none',border:'none',color:'#EF4444',cursor:'pointer',fontSize:12,fontWeight:600,fontFamily:'inherit'}}>Remove</button>}
              </div>
              <FR label="Delivery Location" req><Sel value={stop.location} onChange={v=>setStop(stop.id,'location',v)} options={['',...LOCS.filter(l=>l!=='Orange City (Main)')]} ph="Select destination"/></FR>
              <div style={{fontSize:12,fontWeight:600,color:'#475569',marginBottom:8,marginTop:4}}>Drugs:</div>
              {stop.drugs.map((drug,di)=>(
                <div key={drug.id} style={{background:'#F8FAFC',borderRadius:10,padding:'12px',marginBottom:8,border:'1px solid #E2E8F0'}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                    <div style={{fontSize:12,fontWeight:600,color:'#64748B'}}>Drug {di+1}</div>
                    {stop.drugs.length>1&&<button onClick={()=>delDrug(stop.id,drug.id)} style={{background:'none',border:'none',color:'#EF4444',fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>Remove</button>}
                  </div>
                  <FR label="Drug Name & NDC" req><DrugSearch value={drug.drug?.name||''} ndc={drug.drug?.ndc} onChange={d=>setDrug(stop.id,drug.id,'drug',d)} onClear={()=>setDrug(stop.id,drug.id,'drug',null)}/></FR>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginTop:4}}>
                    <FR label="Qty"><TIn value={drug.qty} onChange={v=>setDrug(stop.id,drug.id,'qty',v)} placeholder="e.g. 2"/></FR>
                    <FR label="Lot #"><TIn value={drug.lot} onChange={v=>setDrug(stop.id,drug.id,'lot',v)} placeholder="Lot"/></FR>
                    <FR label="Exp Date"><TIn type="date" value={drug.expDate} onChange={v=>setDrug(stop.id,drug.id,'expDate',v)}/></FR>
                  </div>
                </div>
              ))}
              <button onClick={()=>addDrug(stop.id)} style={{...S.btnSm,width:'100%',color:'#0369A1',borderColor:'#BAE6FD',background:'#F0F9FF',fontWeight:600,padding:'10px',marginTop:2}}>+ Add Drug</button>
            </div>
          ))}
          <button onClick={addStop} style={{...S.btnSm,width:'100%',marginBottom:12,padding:'12px',color:'#1B2B5E',borderColor:'#C7D2FE',background:'#EEF2FF',fontWeight:600,fontSize:13}}>+ Add Another Stop</button>
          <button onClick={saveRun} style={{...S.btnP,background:'linear-gradient(135deg,#064E3B,#059669)'}}>📤 Save & Publish Run to Driver</button>
        </div>
      )}
    </div>
  );
}

const TABS=[{id:'home',l:'Home',i:'🏠'},{id:'tracker',l:'Track',i:'⏱'},{id:'coldchain',l:'Cold Chain',i:'🌡'},{id:'manifest',l:'Manifest',i:'📋'},{id:'invoice',l:'Invoice',i:'📄'}];
function NavBar({tab,onTab,isTracking,onMgr,pendingCount}){
  return(
    <div style={{position:'fixed',bottom:0,left:0,right:0,background:'white',borderTop:'1px solid #E2E8F0',display:'flex',zIndex:200,maxWidth:480,margin:'0 auto',boxShadow:'0 -2px 12px rgba(0,0,0,0.06)'}}>
      {TABS.map(({id,l,i})=>{
        const a=tab===id;
        return(
          <button key={id} onClick={()=>onTab(id)} style={{flex:1,padding:'8px 2px 10px',border:'none',background:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2,fontFamily:'inherit',position:'relative'}}>
            {id==='tracker'&&isTracking&&<div style={{position:'absolute',top:6,right:'20%',width:7,height:7,borderRadius:'50%',background:'#10B981',border:'2px solid white'}}/>}
            {id==='coldchain'&&pendingCount>0&&<div style={{position:'absolute',top:6,right:'18%',background:'#F59E0B',color:'white',fontSize:8,fontWeight:800,borderRadius:8,padding:'1px 4px',minWidth:14,textAlign:'center'}}>{pendingCount}</div>}
            <div style={{fontSize:18}}>{i}</div>
            <div style={{fontSize:9,fontWeight:a?700:500,color:a?'#1B2B5E':'#94A3B8',textTransform:'uppercase',letterSpacing:'0.04em'}}>{l}</div>
            {a&&<div style={{position:'absolute',bottom:0,left:'20%',right:'20%',height:2.5,background:'#1B2B5E',borderRadius:2}}/>}
          </button>

      <button onClick={onMgr} style={{flex:1,padding:'8px 2px 10px',border:'none',background:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2,fontFamily:'inherit'}}>
        <div style={{fontSize:18}}>💊</div>
        <div style={{fontSize:9,fontWeight:500,color:'#94A3B8',textTransform:'uppercase',letterSpacing:'0.04em'}}>Mgr</div>
      </button>
    </div>
  );
}

// ══════════════════════════════════════════════════════
// ROOT APP
// ══════════════════════════════════════════════════════
function App(){
  const[tab,setTab]=useState('home');
  const[isTracking,setIsTracking]=useState(false);
  const[sessionStart,setSessionStart]=useState(null);
  const[elapsed,setElapsed]=useState(0),[totalMiles,setTotalMiles]=useState(0);
  const[gpsStatus,setGpsStatus]=useState('idle');
  const[timeOnlyMode,setTimeOnlyMode]=useState(false);
  const[sessions,setSessions]=useState([]);
  const[coldChainLogs,setCCLogs]=useState([]);
  const[manifests,setManifests]=useState([]);
  const[runs,setRuns]=useState([]);
  const[showMgr,setShowMgr]=useState(false);
  const[fbMode,setFbMode]=useState(false);

  const watchRef=useRef(null),timerRef=useRef(null),lastPos=useRef(null),milesAcc=useRef(0),sessionStartTs=useRef(null),timeOnlyRef=useRef(false);

  useEffect(()=>{
    setSessions(LS.get('cfrc:sessions')||[]);
    setCCLogs(LS.get('cfrc:cc')||[]);
    setManifests(LS.get('cfrc:mfst')||[]);
    initFirebase();
    if(firebaseDB){setFbMode(true);firebaseDB.ref('cfrc/runs').on('value',snap=>{const data=snap.val();setRuns(data?Object.values(data):[]);});}
    else{setRuns(LS.get('cfrc:runs')||[]);}
  },[]);

  // Wall-clock timer — immune to background tab throttling
  useEffect(()=>{
    if(isTracking){timerRef.current=setInterval(()=>{if(sessionStartTs.current)setElapsed(Math.floor((Date.now()-sessionStartTs.current)/1000));},1000);}
    else clearInterval(timerRef.current);
    return()=>clearInterval(timerRef.current);
  },[isTracking]);

  const startSession=useCallback((timeOnly)=>{
    const forceTimeOnly=timeOnly||!isSecure();
    timeOnlyRef.current=forceTimeOnly;
    setTimeOnlyMode(forceTimeOnly);
    sessionStartTs.current=Date.now();
    setSessionStart(Date.now());setTotalMiles(0);setElapsed(0);milesAcc.current=0;
    if(forceTimeOnly){setIsTracking(true);setGpsStatus('timeonly');return;}
    setGpsStatus('acquiring');
    navigator.geolocation.getCurrentPosition(pos=>{
      const{latitude:lat,longitude:lon}=pos.coords;
      lastPos.current={lat,lon};
      setIsTracking(true);setGpsStatus('locked');
      watchRef.current=navigator.geolocation.watchPosition(p=>{
        const{latitude:la,longitude:lo}=p.coords;
        if(lastPos.current){const d=haversine(lastPos.current.lat,lastPos.current.lon,la,lo);if(d>0.01){milesAcc.current+=d;setTotalMiles(milesAcc.current);lastPos.current={lat:la,lon:lo};}}
        setGpsStatus('locked');
      },()=>setGpsStatus('error'),{enableHighAccuracy:true,maximumAge:5000,timeout:30000});
    },()=>{
      // GPS failed → fall back to time-only automatically
      timeOnlyRef.current=true;setTimeOnlyMode(true);
      setIsTracking(true);setGpsStatus('error');
    },{enableHighAccuracy:true,timeout:12000});
  },[]);

  const endSession=useCallback((manualMilesOverride)=>{
    if(watchRef.current!==null){navigator.geolocation.clearWatch(watchRef.current);watchRef.current=null;}
    setIsTracking(false);setGpsStatus('idle');
    const endTime=Date.now();
    const finalMiles=manualMilesOverride!=null?manualMilesOverride:milesAcc.current;
    const s={id:Date.now(),date:fmtD(sessionStart),startTime:sessionStart,endTime,totalSeconds:Math.floor((endTime-sessionStart)/1000),totalMiles:finalMiles,timeOnly:timeOnlyRef.current};
    const u=[...sessions,s];setSessions(u);LS.set('cfrc:sessions',u);
  },[sessions,sessionStart]);

  const delSession=id=>{const u=sessions.filter(s=>s.id!==id);setSessions(u);LS.set('cfrc:sessions',u);};

  const saveCC=l=>{const u=[...coldChainLogs,{...l,id:uid()}];setCCLogs(u);LS.set('cfrc:cc',u);};
  const updateCC=(id,updates)=>{const u=coldChainLogs.map(l=>l.id===id?{...l,...updates,form:{...(l.form||{}), ...updates}}:l);setCCLogs(u);LS.set('cfrc:cc',u);};
  const delCC=id=>{const u=coldChainLogs.filter(l=>l.id!==id);setCCLogs(u);LS.set('cfrc:cc',u);};
  const saveMf=m=>{const u=[...manifests,{...m,id:uid()}];setManifests(u);LS.set('cfrc:mfst',u);};
  const delMf=id=>{const u=manifests.filter(m=>m.id!==id);setManifests(u);LS.set('cfrc:mfst',u);};
  const saveRun=r=>{if(firebaseDB)firebaseDB.ref('cfrc/runs/'+r.id).set(r);else{const u=[...runs,r];setRuns(u);LS.set('cfrc:runs',u);}};
  const delRun=id=>{if(firebaseDB)firebaseDB.ref('cfrc/runs/'+id).remove();else{const u=runs.filter(r=>r.id!==id);setRuns(u);LS.set('cfrc:runs',u);}};

  const pendingCount=coldChainLogs.filter(l=>l.status==='pending').length;

  const screens={
    home:<HomeScreen sessions={sessions} coldChainLogs={coldChainLogs} manifests={manifests} isTracking={isTracking} elapsed={elapsed} totalMiles={totalMiles} go={setTab} runs={runs} fbMode={fbMode}/>,
    tracker:<TrackerScreen isTracking={isTracking} elapsed={elapsed} totalMiles={totalMiles} gpsStatus={gpsStatus} sessionStart={sessionStart} onStart={startSession} onEnd={endSession} sessions={sessions} onDel={delSession} timeOnlyMode={timeOnlyMode}/>,
    coldchain:<ColdChainScreen logs={coldChainLogs} onSave={saveCC} onUpdate={updateCC} onDel={delCC} runs={runs}/>,
    manifest:<ManifestScreen manifests={manifests} onSave={saveMf} onDel={delMf}/>,
    invoice:<InvoiceScreen sessions={sessions} coldChainLogs={coldChainLogs} manifests={manifests}/>,
  };

  return(
    <div style={{fontFamily:'-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif',background:'#EEF2FF',minHeight:'100vh',maxWidth:480,margin:'0 auto',position:'relative'}}>
      <div style={{paddingBottom:80,minHeight:'100vh'}}>{screens[tab]}</div>
      <NavBar tab={tab} onTab={setTab} isTracking={isTracking} onMgr={()=>setShowMgr(true)} pendingCount={pendingCount}/>
      {showMgr&&<DrugManagerPortal runs={runs} onSaveRun={saveRun} onDelRun={delRun} onClose={()=>setShowMgr(false)} fbMode={fbMode}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
