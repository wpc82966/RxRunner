// INVOICE SCREEN
// ══════════════════════════════════════════════════════
function InvoiceScreen({sessions,coldChainLogs,manifests,config}){
  const[name,setName]=useState('');
  const bw=()=>{const n=new Date(),d=n.getDate(),y=n.getFullYear(),m=n.getMonth();return d<=15?{start:new Date(y,m,1).getTime(),end:new Date(y,m,15,23,59,59).getTime()}:{start:new Date(y,m,16).getTime(),end:new Date(y,m+1,0,23,59,59).getTime()};};
  const[period,setPeriod]=useState(bw);
  const prev=()=>setPeriod(p=>{const s=new Date(p.start);if(s.getDate()===1){const pm=new Date(s.getFullYear(),s.getMonth()-1);return{start:new Date(pm.getFullYear(),pm.getMonth(),16).getTime(),end:new Date(s.getFullYear(),s.getMonth(),0,23,59,59).getTime()};}return{start:new Date(s.getFullYear(),s.getMonth(),1).getTime(),end:new Date(s.getFullYear(),s.getMonth(),15,23,59,59).getTime()};});
  const next=()=>setPeriod(p=>{const e=new Date(p.end);if(e.getDate()===15)return{start:new Date(e.getFullYear(),e.getMonth(),16).getTime(),end:new Date(e.getFullYear(),e.getMonth()+1,0,23,59,59).getTime()};const nm=new Date(e.getFullYear(),e.getMonth()+1);return{start:nm.getTime(),end:new Date(nm.getFullYear(),nm.getMonth(),15,23,59,59).getTime()};});
  const ps=sessions.filter(s=>s.startTime>=period.start&&s.startTime<=period.end);
  const totHrs=ps.reduce((a,s)=>a+s.totalSeconds,0)/3600,totMi=ps.reduce((a,s)=>a+s.totalMiles,0);
  const hPay=totHrs*HOURLY_RATE,mPay=totMi*MILE_RATE,total=hPay+mPay;
  const pc=coldChainLogs.filter(l=>l.status==='complete'&&(l.pickupTimestamp||l.timestamp)>=period.start&&(l.pickupTimestamp||l.timestamp)<=period.end);
  const pm=manifests.filter(m=>m.timestamp>=period.start&&m.timestamp<=period.end);
  const billingEmail=config?.billingEmail||'billing@yourorg.com';
  const orgName=config?.orgName||'Your Organization';
  const send=()=>{
    const subj=encodeURIComponent(`Biweekly Invoice — ${name||'[Contractor]'} — ${fmtD(period.start)} to ${fmtD(period.end)}`);
    const body=encodeURIComponent(`====================================================\n  INVOICE — ${orgName.toUpperCase()}\n  Powered by RxRunner\n====================================================\nContractor:    ${name||'[Full Legal Name]'}\nPay Period:    ${fmtD(period.start)} – ${fmtD(period.end)}\nSubmitted:     ${fmtDT(Date.now())}\n====================================================\nHours:    ${totHrs.toFixed(2)} hrs × $${HOURLY_RATE.toFixed(2)}/hr = ${cur(hPay)}\nMileage:  ${totMi.toFixed(2)} mi  × $${MILE_RATE}/mi  = ${cur(mPay)}\n────────────────────────────────────────────────────\nTOTAL DUE:    ${cur(total)}\n====================================================\nSESSIONS (${ps.length}):\n${ps.map(s=>`  ${s.date} | ${fmtT(s.totalSeconds)} | ${s.totalMiles.toFixed(2)} mi | ${cur(s.totalSeconds/3600*HOURLY_RATE+s.totalMiles*MILE_RATE)}`).join('\n')||'  (none)'}\n\nCold Chain Logs (complete): ${pc.length}\nDelivery Manifests: ${pm.length}\nPayment Method:     ACH Direct Deposit\n====================================================`);
    window.open(`mailto:${billingEmail}?subject=${subj}&body=${body}`,'_blank');
  };
  return(
    <div style={{paddingBottom:90}}>
      <div style={{background:'linear-gradient(135deg,#064E3B,#059669)',padding:'40px 20px 20px',color:'white'}}>
        <div style={{fontSize:10,opacity:0.6,textTransform:'uppercase',letterSpacing:'0.08em'}}>Pay Period Report</div>
        <div style={{fontSize:24,fontWeight:900,letterSpacing:'-0.02em',marginTop:4}}>Invoice Generator</div>
      </div>
      <div style={{padding:'14px'}}>
        <div style={S.card}><FR label="Your Full Name"><TIn value={name} onChange={setName} placeholder="Full legal name"/></FR></div>
        <div style={S.card}>
          <div style={{fontSize:12,fontWeight:600,color:'#475569',marginBottom:10}}>Pay Period</div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <button onClick={prev} style={{...S.btnSm,flex:'none',width:38,padding:'9px',fontSize:18,textAlign:'center'}}>‹</button>
            <div style={{flex:1,textAlign:'center',background:'#F8FAFC',borderRadius:10,padding:'11px 8px'}}>
              <div style={{fontSize:13,fontWeight:700,color:'#1E293B'}}>{fmtD(period.start)} – {fmtD(period.end)}</div>
              <div style={{fontSize:11,color:'#94A3B8',marginTop:2}}>{ps.length} session{ps.length!==1?'s':''}</div>
            </div>
            <button onClick={next} style={{...S.btnSm,flex:'none',width:38,padding:'9px',fontSize:18,textAlign:'center'}}>›</button>
          </div>
        </div>
        <div style={S.card}>
          <div style={S.hdiv}>Pay Summary</div>
          {[{l:`Hours — ${totHrs.toFixed(2)} hrs × $${HOURLY_RATE}/hr`,v:cur(hPay)},{l:`Mileage — ${totMi.toFixed(2)} mi × $${MILE_RATE}/mi`,v:cur(mPay)}].map(({l,v})=>(
            <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'9px 0',borderBottom:'1px solid #F1F5F9'}}><div style={{fontSize:13,color:'#475569'}}>{l}</div><div style={{fontSize:13,fontWeight:600}}>{v}</div></div>
          ))}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingTop:12}}>
            <div style={{fontSize:15,fontWeight:700,color:'#064E3B'}}>Total Due</div>
            <div style={{fontSize:28,fontWeight:900,color:'#059669',letterSpacing:'-0.02em'}}>{cur(total)}</div>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:12}}>
          {[{n:ps.length,l:'Sessions',i:'⏱'},{n:pc.length,l:'Cold Chain',i:'🌡'},{n:pm.length,l:'Manifests',i:'📋'}].map(({n,l,i})=>(
            <div key={l} style={{background:'white',borderRadius:10,padding:'13px 8px',textAlign:'center',boxShadow:'0 1px 3px rgba(0,0,0,0.05)'}}><div style={{fontSize:22}}>{i}</div><div style={{fontSize:20,fontWeight:800,color:'#1B2B5E',marginTop:4}}>{n}</div><div style={{fontSize:10,color:'#94A3B8',marginTop:2}}>{l}</div></div>
          ))}
        </div>
        <button onClick={send} disabled={ps.length===0} style={{...S.btnP,background:ps.length>0?'linear-gradient(135deg,#064E3B,#059669)':'#E2E8F0',color:ps.length>0?'white':'#94A3B8',cursor:ps.length>0?'pointer':'default',display:'flex',alignItems:'center',justifyContent:'center',gap:10}}>
          ✉  Submit Invoice via Email
        </button>
        <div style={{fontSize:11,color:'#94A3B8',textAlign:'center',marginTop:7}}>Sends to {billingEmail}</div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
// DRUG MANAGER PORTAL — with Excel upload
// ══════════════════════════════════════════════════════
function DrugManagerPortal({runs,onSaveRun,onDelRun,onClose,fbMode}){
  const[authed,setAuthed]=useState(false),[pw,setPw]=useState(''),[pwErr,setPwErr]=useState(false);
  const[view,setView]=useState('list');
  const today=todayISO();
  const[runDate,setRunDate]=useState(today);
  const[stops,setStops]=useState([{id:uid(),location:'',drugs:[{id:uid(),drug:null,qty:'',lot:'',expDate:''}]}]);
  const[saved,setSaved]=useState(false);
  const[xlsxPreview,setXlsxPreview]=useState(null);
  const[xlsxError,setXlsxError]=useState('');
  const[xlsxSaved,setXlsxSaved]=useState(false);

  const login=()=>{if(pw===MGR_PASSWORD){setAuthed(true);setPwErr(false);}else setPwErr(true);};
  const addStop=()=>setStops(p=>[...p,{id:uid(),location:'',drugs:[{id:uid(),drug:null,qty:'',lot:'',expDate:''}]}]);
  const delStop=id=>setStops(p=>p.filter(s=>s.id!==id));
  const setStop=(id,k,v)=>setStops(p=>p.map(s=>s.id===id?{...s,[k]:v}:s));
  const addDrug=sid=>setStops(p=>p.map(s=>s.id===sid?{...s,drugs:[...s.drugs,{id:uid(),drug:null,qty:'',lot:'',expDate:''}]}:s));
  const delDrug=(sid,did)=>setStops(p=>p.map(s=>s.id===sid?{...s,drugs:s.drugs.filter(d=>d.id!==did)}:s));
  const setDrug=(sid,did,k,v)=>setStops(p=>p.map(s=>s.id===sid?{...s,drugs:s.drugs.map(d=>d.id===did?{...d,[k]:v}:d)}:s));

  const saveRun=()=>{
    if(!runDate){alert('Select a date.');return;}
    if(!stops.every(s=>s.location&&s.drugs.every(d=>d.drug))){alert('Select location and at least one drug for each stop.');return;}
    const run={id:uid(),date:runDate,stops:stops.map(s=>({location:s.location,drugs:s.drugs.map(d=>({name:d.drug.name,ndc:d.drug.ndc,mfr:d.drug.mfr,qty:d.qty,lot:d.lot,expDate:d.expDate}))})),createdAt:Date.now()};
    onSaveRun(run);
    setStops([{id:uid(),location:'',drugs:[{id:uid(),drug:null,qty:'',lot:'',expDate:''}]}]);setRunDate(today);
    setSaved(true);setTimeout(()=>{setSaved(false);setView('list');},2000);
  };

  const handleXLSX=e=>{
    const file=e.target.files[0];if(!file)return;
    setXlsxError('');setXlsxPreview(null);setXlsxSaved(false);
    const reader=new FileReader();
    reader.onload=ev=>{
      e.target.value='';
      try{
        const wb=XLSX.read(ev.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});

        // Find header row — must have 'Delivery Date' AND 'Delivery Location' as INDIVIDUAL cells
        // (not buried inside a long instruction sentence)
        let headerIdx=-1;
        for(let i=0;i<raw.length;i++){
          const cells=raw[i].map(c=>String(c||'').trim().toLowerCase());
          const hasDate=cells.some(c=>c==='delivery date');
          const hasLoc=cells.some(c=>c==='delivery location');
          if(hasDate&&hasLoc){headerIdx=i;break;}
        }
        if(headerIdx===-1){
          setXlsxError('Could not find the header row. Make sure your file has columns exactly named "Delivery Date" and "Delivery Location". Download the template for the correct format.');
          return;
        }

        const headers=raw[headerIdx].map(h=>String(h||'').trim());
        const dataRows=raw.slice(headerIdx+1).filter(r=>r.some(c=>String(c||'').trim()!=''));
        if(!dataRows.length){setXlsxError('No data rows found below the header row.');return;}

        // Convert Excel serial date number → YYYY-MM-DD string
        const parseDate=val=>{
          const s=String(val||'').trim();
          if(!s)return today;
          const n=Number(s);
          if(!isNaN(n)&&n>40000){
            // Excel serial date: days since Jan 1 1900 (with Excel's leap-year bug offset of 25569 to Unix epoch)
            const d=new Date((n-25569)*86400*1000);
            return d.toISOString().slice(0,10);
          }
          return s; // already a string date
        };

        // Map row array → object using detected headers
        const toObj=row=>{
          const obj={};
          headers.forEach((h,i)=>{obj[h]=String(row[i]||'').trim();});
          return obj;
        };

        // Case-insensitive key lookup with fallback aliases
        const get=(obj,...keys)=>{
          for(const k of keys){
            const found=Object.keys(obj).find(ok=>ok.toLowerCase()===k.toLowerCase());
            if(found&&obj[found])return String(obj[found]).trim();
          }
          return '';
        };

        const groups={};
        dataRows.forEach(rawRow=>{
          const r=toObj(rawRow);
          const date=parseDate(get(r,'delivery date','date'));
          const loc=get(r,'delivery location','location','destination');
          const drugName=get(r,'drug name','drug','name');
          const qty=get(r,'qty *required*','qty','quantity');
          if(!loc||!drugName)return;
          const key=`${date}||${loc}`;
          if(!groups[key])groups[key]={date,location:loc,drugs:[]};
          const matchedDrug=DRUG_MASTER.find(d=>
            d.name.toLowerCase()===drugName.toLowerCase()||
            d.ndc.replace(/-/g,'')===drugName.replace(/-/g,'').replace(/\s/g,'')
          );
          groups[key].drugs.push({
            name:matchedDrug?.name||drugName,
            ndc:matchedDrug?.ndc||get(r,'ndc','ndccode'),
            mfr:matchedDrug?.mfr||'',
            qty,
            lot:get(r,'lot # (optional)','lot #','lot number','lot'),
            expDate:get(r,'exp date (optional)','exp date','expiration date','exp'),
          });
        });

        const preview=Object.values(groups);
        if(!preview.length){setXlsxError('No valid drug rows found. Make sure Delivery Location and Drug Name columns are filled in.');return;}
        setXlsxPreview(preview);
      }catch(err){setXlsxError('Error reading file: '+err.message+'. Make sure you are uploading an .xlsx file.');}
    };
    reader.onerror=()=>setXlsxError('Could not read the file. Please try again.');
    reader.readAsArrayBuffer(file);
  };

  const saveXLSXRun=()=>{
    if(!xlsxPreview)return;
    // Group stops by date into runs
    const byDate={};
    xlsxPreview.forEach(g=>{
      if(!byDate[g.date])byDate[g.date]=[];
      byDate[g.date].push({location:g.location,drugs:g.drugs});
    });
    Object.entries(byDate).forEach(([date,stops])=>{
      onSaveRun({id:uid(),date,stops,createdAt:Date.now(),source:'xlsx'});
    });
    setXlsxPreview(null);setXlsxSaved(true);setTimeout(()=>{setXlsxSaved(false);setView('list');},2000);
  };

  if(!authed)return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'white',borderRadius:20,padding:28,width:'100%',maxWidth:380,boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
        <div style={{textAlign:'center',marginBottom:24}}><div style={{fontSize:36,marginBottom:8}}>💊</div><div style={{fontSize:20,fontWeight:800,color:'#1B2B5E'}}>Drug Manager Portal</div><div style={{fontSize:12,color:'#94A3B8',marginTop:4}}>CFRC — Authorized Staff Only</div></div>
        <div style={{fontSize:12,color:fbMode?'#059669':'#F59E0B',background:fbMode?'#F0FDF4':'#FFFBEB',border:`1px solid ${fbMode?'#86EFAC':'#FDE68A'}`,borderRadius:8,padding:'8px 12px',marginBottom:12,textAlign:'center'}}>
          {fbMode?'🟢 Firebase Connected — runs sync in real time':'🟡 Offline Mode — runs saved locally only'}
        </div>
        <input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&login()} placeholder="Enter portal password" style={{...S.input,marginBottom:10,borderColor:pwErr?'#EF4444':'#CBD5E1'}}/>
        {pwErr&&<div style={{color:'#DC2626',fontSize:12,marginBottom:10}}>Incorrect password.</div>}
        <button onClick={login} style={{...S.btnP,background:'linear-gradient(135deg,#1B2B5E,#2E4FAF)',marginBottom:10}}>Sign In</button>
        <button onClick={onClose} style={{...S.btnSm,width:'100%',textAlign:'center',padding:'12px'}}>Cancel</button>
      </div>
    </div>
  );

  return(
    <div style={{position:'fixed',inset:0,background:'#EEF2FF',zIndex:1000,overflowY:'auto',maxWidth:480,margin:'0 auto'}}>
      <div style={{background:'linear-gradient(135deg,#064E3B,#059669)',padding:'40px 20px 16px',color:'white',display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div>
          <div style={{fontSize:10,opacity:0.6,textTransform:'uppercase',letterSpacing:'0.08em'}}>CFRC Drug Manager</div>
          <div style={{fontSize:22,fontWeight:900,letterSpacing:'-0.02em',marginTop:4}}>Delivery Run Manager</div>
          <div style={{fontSize:11,opacity:0.7,marginTop:6}}>{fbMode?'🟢 Firebase — real-time sync':'🟡 Local only'}</div>
        </div>
        <button onClick={onClose} style={{background:'rgba(255,255,255,0.2)',border:'none',borderRadius:8,color:'white',fontSize:13,fontWeight:600,padding:'8px 12px',cursor:'pointer',fontFamily:'inherit'}}>✕ Close</button>
      </div>
      <div style={{display:'flex',borderBottom:'1px solid #E2E8F0',background:'white'}}>
        {[['list',`Runs (${runs.length})`],['upload','📊 Upload Excel'],['create','+ Manual']].map(([v,l])=>(
          <button key={v} onClick={()=>setView(v)} style={{flex:1,padding:'12px 4px',border:'none',background:'none',cursor:'pointer',fontSize:12,fontWeight:view===v?700:500,color:view===v?'#059669':'#64748B',borderBottom:view===v?'2.5px solid #059669':'2.5px solid transparent',fontFamily:'inherit'}}>{l}</button>
        ))}
      </div>

      {/* All Runs */}
      {view==='list'&&(
        <div style={{padding:'14px',paddingBottom:40}}>
          {runs.length===0
            ?<div style={{textAlign:'center',padding:'50px 20px',color:'#94A3B8'}}><div style={{fontSize:36,marginBottom:12}}>📦</div><div style={{fontSize:14}}>No runs yet</div><button onClick={()=>setView('upload')} style={{marginTop:14,background:'#059669',border:'none',borderRadius:10,color:'white',fontSize:13,fontWeight:600,padding:'10px 20px',cursor:'pointer',fontFamily:'inherit'}}>Upload Excel File</button></div>
            :[...runs].reverse().map(r=>(
              <div key={r.id} style={{background:'white',borderRadius:12,padding:'14px',marginBottom:10,boxShadow:'0 1px 3px rgba(0,0,0,0.05)',borderLeft:`3px solid ${r.date===today?'#059669':'#CBD5E1'}`}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',marginBottom:6}}>
                      <div style={{fontSize:13,fontWeight:700,color:'#1E293B'}}>{new Date(r.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div>
                      {r.date===today&&<span style={{fontSize:10,fontWeight:700,background:'#DCFCE7',color:'#059669',padding:'2px 8px',borderRadius:20}}>TODAY</span>}
                      {r.source==='xlsx'&&<span style={{fontSize:10,fontWeight:600,background:'#EFF6FF',color:'#1D4ED8',padding:'2px 8px',borderRadius:20}}>XLSX</span>}
                    </div>
                    {r.stops.map((s,i)=><div key={i} style={{fontSize:12,color:'#475569',marginBottom:3}}><span style={{fontWeight:600}}>Stop {i+1}:</span> {s.location} — {s.drugs.map(d=>d.name.split(' ').slice(0,2).join(' ')).join(', ')}</div>)}
                  </div>
                  <button onClick={()=>onDelRun(r.id)} style={{background:'none',border:'none',color:'#FCA5A5',cursor:'pointer',fontSize:17,padding:4}}>✕</button>
                </div>
              </div>
            ))
          }
        </div>
      )}

      {/* Excel Upload */}
      {view==='upload'&&(
        <div style={{padding:'14px',paddingBottom:60}}>
          {xlsxSaved&&<div style={{background:'#ECFDF5',border:'1px solid #6EE7B7',borderRadius:10,padding:'12px 14px',marginBottom:12,color:'#065F46',fontSize:13,fontWeight:600}}>✓ Runs saved from Excel file{fbMode?' — synced to driver in real time':''}</div>}
          <div style={{...S.card,background:'#F0FDF4',border:'1px solid #86EFAC'}}>
            <div style={{fontSize:13,fontWeight:700,color:'#065F46',marginBottom:8}}>Step 1: Download the Template</div>
            <div style={{fontSize:12,color:'#047857',marginBottom:12,lineHeight:1.5}}>Use the Excel template to enter all drugs and quantities. One row per drug. Rows with the same date + delivery location are grouped into one stop automatically.</div>
            <button onClick={downloadXLSXTemplate} style={{...S.btnP,background:'#059669',fontSize:13}}>⬇ Download Drug Run Template (.xlsx)</button>
          </div>
          <div style={S.card}>
            <div style={{fontSize:13,fontWeight:700,color:'#1B2B5E',marginBottom:8}}>Step 2: Upload Completed File</div>
            <div style={{border:'2px dashed #CBD5E1',borderRadius:10,padding:'24px',textAlign:'center',background:'#F8FAFC',marginBottom:10}}>
              <div style={{fontSize:28,marginBottom:8}}>📊</div>
              <div style={{fontSize:13,color:'#475569',marginBottom:12}}>Select your filled-in Excel file</div>
              <label style={{display:'inline-block',background:'#1B2B5E',color:'white',padding:'10px 20px',borderRadius:8,cursor:'pointer',fontSize:13,fontWeight:600}}>
                Choose .xlsx File
                <input type="file" accept=".xlsx,.xls,.csv" onChange={handleXLSX} style={{display:'none'}}/>
              </label>
            </div>
            {xlsxError&&<div style={{background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:8,padding:'10px 12px',color:'#991B1B',fontSize:12,marginBottom:10}}>{xlsxError}</div>}
          </div>
          {xlsxPreview&&(
            <div style={S.card}>
              <div style={{fontSize:13,fontWeight:700,color:'#1B2B5E',marginBottom:12}}>Step 3: Review & Publish</div>
              {xlsxPreview.map((g,i)=>(
                <div key={i} style={{background:'#F8FAFC',borderRadius:10,padding:'12px',marginBottom:8,border:'1px solid #E2E8F0'}}>
                  <div style={{fontSize:12,fontWeight:700,color:'#1E293B',marginBottom:6}}>{g.location} <span style={{fontWeight:400,color:'#94A3B8'}}>— {g.date}</span></div>
                  {g.drugs.map((d,j)=>(
                    <div key={j} style={{fontSize:12,color:'#475569',padding:'4px 0',borderTop:j>0?'1px solid #F1F5F9':'none'}}>
                      <span style={{fontWeight:500}}>{d.name}</span>
                      {d.qty&&<span style={{color:'#94A3B8',marginLeft:8}}>Qty: {d.qty}</span>}
                      {d.lot&&<span style={{color:'#94A3B8',marginLeft:8}}>Lot: {d.lot}</span>}
                      {!d.ndc&&<span style={{color:'#F59E0B',marginLeft:8,fontSize:11}}>⚠ NDC not matched</span>}
                    </div>
                  ))}
                </div>
              ))}
              <div style={{fontSize:11,color:'#94A3B8',marginBottom:12}}>
                {xlsxPreview.reduce((a,g)=>a+g.drugs.length,0)} drugs across {xlsxPreview.length} stop{xlsxPreview.length!==1?'s':''}
              </div>
              <button onClick={saveXLSXRun} style={{...S.btnP,background:'linear-gradient(135deg,#064E3B,#059669)'}}>📤 Publish to Driver</button>
              <button onClick={()=>setXlsxPreview(null)} style={{...S.btnSm,width:'100%',marginTop:8,padding:'12px',textAlign:'center'}}>Cancel — Re-upload</button>
            </div>
          )}
        </div>
      )}

      {/* Manual Create */}
      {view==='create'&&(
        <div style={{padding:'14px',paddingBottom:60}}>
          {saved&&<div style={{background:'#ECFDF5',border:'1px solid #6EE7B7',borderRadius:10,padding:'12px 14px',marginBottom:12,color:'#065F46',fontSize:13,fontWeight:600}}>✓ Run saved — driver sees it immediately</div>}
          <div style={S.card}><FR label="Delivery Date" req><input type="date" value={runDate} onChange={e=>setRunDate(e.target.value)} style={S.input}/></FR></div>
          {stops.map((stop,si)=>(
            <div key={stop.id} style={{...S.card,border:'1px solid #E2E8F0'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <div style={{fontSize:13,fontWeight:700,color:'#1B2B5E'}}>Stop {si+1}</div>
                {stops.length>1&&<button onClick={()=>delStop(stop.id)} style={{background:'none',border:'none',color:'#EF4444',cursor:'pointer',fontSize:12,fontWeight:600,fontFamily:'inherit'}}>Remove</button>}
              </div>
              <FR label="Delivery Location" req><Sel value={stop.location} onChange={v=>setStop(stop.id,'location',v)} options={['',...LOCS.filter(l=>l!=='Orange City (Main)')]} ph="Select destination"/></FR>
              <div style={{fontSize:12,fontWeight:600,color:'#475569',marginBottom:8,marginTop:4}}>Drugs:</div>
              {stop.drugs.map((drug,di)=>(
                <div key={drug.id} style={{background:'#F8FAFC',borderRadius:10,padding:'12px',marginBottom:8,border:'1px solid #E2E8F0'}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                    <div style={{fontSize:12,fontWeight:600,color:'#64748B'}}>Drug {di+1}</div>
                    {stop.drugs.length>1&&<button onClick={()=>delDrug(stop.id,drug.id)} style={{background:'none',border:'none',color:'#EF4444',fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>Remove</button>}
                  </div>
                  <FR label="Drug Name & NDC" req><DrugSearch value={drug.drug?.name||''} ndc={drug.drug?.ndc} onChange={d=>setDrug(stop.id,drug.id,'drug',d)} onClear={()=>setDrug(stop.id,drug.id,'drug',null)}/></FR>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginTop:4}}>
                    <FR label="Qty"><TIn value={drug.qty} onChange={v=>setDrug(stop.id,drug.id,'qty',v)} placeholder="e.g. 2"/></FR>
                    <FR label="Lot #"><TIn value={drug.lot} onChange={v=>setDrug(stop.id,drug.id,'lot',v)} placeholder="Lot"/></FR>
                    <FR label="Exp Date"><TIn type="date" value={drug.expDate} onChange={v=>setDrug(stop.id,drug.id,'expDate',v)}/></FR>
                  </div>
                </div>
              ))}
              <button onClick={()=>addDrug(stop.id)} style={{...S.btnSm,width:'100%',color:'#0369A1',borderColor:'#BAE6FD',background:'#F0F9FF',fontWeight:600,padding:'10px',marginTop:2}}>+ Add Drug</button>
            </div>
          ))}
          <button onClick={addStop} style={{...S.btnSm,width:'100%',marginBottom:12,padding:'12px',color:'#1B2B5E',borderColor:'#C7D2FE',background:'#EEF2FF',fontWeight:600,fontSize:13}}>+ Add Another Stop</button>
          <button onClick={saveRun} style={{...S.btnP,background:'linear-gradient(135deg,#064E3B,#059669)'}}>📤 Save & Publish Run to Driver</button>
        </div>
      )}
    </div>
  );
}

// NAV BAR
// ══════════════════════════════════════════════════════
const TABS=[{id:'home',l:'Home',i:'🏠'},{id:'tracker',l:'Track',i:'⏱'},{id:'coldchain',l:'Cold Chain',i:'🌡'},{id:'manifest',l:'Manifest',i:'📋'},{id:'invoice',l:'Invoice',i:'📄'}];
function NavBar({tab,onTab,isTracking,onMgr,pendingCount}){
  return(
    <div style={{position:'fixed',bottom:0,left:0,right:0,background:'white',borderTop:'1px solid #E2E8F0',display:'flex',zIndex:200,maxWidth:480,margin:'0 auto',boxShadow:'0 -2px 12px rgba(0,0,0,0.06)'}}>
      {TABS.map(({id,l,i})=>{
        const a=tab===id;
        return(
          <button key={id} onClick={()=>onTab(id)} style={{flex:1,padding:'8px 2px 10px',border:'none',background:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2,fontFamily:'inherit',position:'relative'}}>
            {id==='tracker'&&isTracking&&<div style={{position:'absolute',top:6,right:'20%',width:7,height:7,borderRadius:'50%',background:'#10B981',border:'2px solid white'}}/>}
            {id==='coldchain'&&pendingCount>0&&<div style={{position:'absolute',top:6,right:'18%',background:'#F59E0B',color:'white',fontSize:8,fontWeight:800,borderRadius:8,padding:'1px 4px',minWidth:14,textAlign:'center'}}>{pendingCount}</div>}
            <div style={{fontSize:18}}>{i}</div>
            <div style={{fontSize:9,fontWeight:a?700:500,color:a?'#1B2B5E':'#94A3B8',textTransform:'uppercase',letterSpacing:'0.04em'}}>{l}</div>
            {a&&<div style={{position:'absolute',bottom:0,left:'20%',right:'20%',height:2.5,background:'#1B2B5E',borderRadius:2}}/>}
          </button>
        );
      })}
      <button onClick={onMgr} style={{flex:1,padding:'8px 2px 10px',border:'none',background:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2,fontFamily:'inherit'}}>
        <div style={{fontSize:18}}>💊</div>
        <div style={{fontSize:9,fontWeight:500,color:'#94A3B8',textTransform:'uppercase',letterSpacing:'0.04em'}}>Mgr</div>
      </button>
    </div>
  );
}

// ══════════════════════════════════════════════════════
// ROOT APP
// ══════════════════════════════════════════════════════
function App(){
  const[tab,setTab]=useState('home');
  const[isTracking,setIsTracking]=useState(false);
  const[sessionStart,setSessionStart]=useState(null);
  const[elapsed,setElapsed]=useState(0),[totalMiles,setTotalMiles]=useState(0);
  const[gpsStatus,setGpsStatus]=useState('idle');
  const[timeOnlyMode,setTimeOnlyMode]=useState(false);
  const[sessions,setSessions]=useState([]);
  const[coldChainLogs,setCCLogs]=useState([]);
  const[manifests,setManifests]=useState([]);
  const[runs,setRuns]=useState([]);
  const[showMgr,setShowMgr]=useState(false);
  const[fbMode,setFbMode]=useState(false);
  const[config,setConfig]=useState(null);      // null = not yet loaded
  const[showSetup,setShowSetup]=useState(false);
  const[showSettings,setShowSettings]=useState(false);

  const watchRef=useRef(null),timerRef=useRef(null),lastPos=useRef(null),milesAcc=useRef(0),sessionStartTs=useRef(null),timeOnlyRef=useRef(false);

  useEffect(()=>{
    const cfg=loadConfig();
    setConfig(cfg);
    if(!cfg.setupDone){setShowSetup(true);return;}
    setSessions(LS.get('cfrc:sessions')||[]);
    setCCLogs(LS.get('cfrc:cc')||[]);
    setManifests(LS.get('cfrc:mfst')||[]);
    initFirebase();
    if(firebaseDB){setFbMode(true);firebaseDB.ref('cfrc/runs').on('value',snap=>{const data=snap.val();setRuns(data?Object.values(data):[]);});}
    else{setRuns(LS.get('cfrc:runs')||[]);}
  },[]);

  // Wall-clock timer — immune to background tab throttling
  useEffect(()=>{
    if(isTracking){timerRef.current=setInterval(()=>{if(sessionStartTs.current)setElapsed(Math.floor((Date.now()-sessionStartTs.current)/1000));},1000);}
    else clearInterval(timerRef.current);
    return()=>clearInterval(timerRef.current);
  },[isTracking]);

  const startSession=useCallback((timeOnly)=>{
    const forceTimeOnly=timeOnly||!isSecure();
    timeOnlyRef.current=forceTimeOnly;
    setTimeOnlyMode(forceTimeOnly);
    sessionStartTs.current=Date.now();
    setSessionStart(Date.now());setTotalMiles(0);setElapsed(0);milesAcc.current=0;
    if(forceTimeOnly){setIsTracking(true);setGpsStatus('timeonly');return;}
    setGpsStatus('acquiring');
    navigator.geolocation.getCurrentPosition(pos=>{
      const{latitude:lat,longitude:lon}=pos.coords;
      lastPos.current={lat,lon};
      setIsTracking(true);setGpsStatus('locked');
      watchRef.current=navigator.geolocation.watchPosition(p=>{
        const{latitude:la,longitude:lo}=p.coords;
        if(lastPos.current){const d=haversine(lastPos.current.lat,lastPos.current.lon,la,lo);if(d>0.01){milesAcc.current+=d;setTotalMiles(milesAcc.current);lastPos.current={lat:la,lon:lo};}}
        setGpsStatus('locked');
      },()=>setGpsStatus('error'),{enableHighAccuracy:true,maximumAge:5000,timeout:30000});
    },()=>{
      // GPS failed → fall back to time-only automatically
      timeOnlyRef.current=true;setTimeOnlyMode(true);
      setIsTracking(true);setGpsStatus('error');
    },{enableHighAccuracy:true,timeout:12000});
  },[]);

  const endSession=useCallback((manualMilesOverride)=>{
    if(watchRef.current!==null){navigator.geolocation.clearWatch(watchRef.current);watchRef.current=null;}
    setIsTracking(false);setGpsStatus('idle');
    const endTime=Date.now();
    const finalMiles=manualMilesOverride!=null?manualMilesOverride:milesAcc.current;
    const s={id:Date.now(),date:fmtD(sessionStart),startTime:sessionStart,endTime,totalSeconds:Math.floor((endTime-sessionStart)/1000),totalMiles:finalMiles,timeOnly:timeOnlyRef.current};
    const u=[...sessions,s];setSessions(u);LS.set('cfrc:sessions',u);
  },[sessions,sessionStart]);

  const delSession=id=>{const u=sessions.filter(s=>s.id!==id);setSessions(u);LS.set('cfrc:sessions',u);};

  const saveCC=l=>{const u=[...coldChainLogs,{...l,id:uid()}];setCCLogs(u);LS.set('cfrc:cc',u);};
  const updateCC=(id,updates)=>{const u=coldChainLogs.map(l=>l.id===id?{...l,...updates,form:{...(l.form||{}), ...updates}}:l);setCCLogs(u);LS.set('cfrc:cc',u);};
  const delCC=id=>{const u=coldChainLogs.filter(l=>l.id!==id);setCCLogs(u);LS.set('cfrc:cc',u);};
  const saveMf=m=>{const u=[...manifests,{...m,id:uid()}];setManifests(u);LS.set('cfrc:mfst',u);};
  const delMf=id=>{const u=manifests.filter(m=>m.id!==id);setManifests(u);LS.set('cfrc:mfst',u);};
  const saveRun=r=>{if(firebaseDB)firebaseDB.ref('cfrc/runs/'+r.id).set(r);else{const u=[...runs,r];setRuns(u);LS.set('cfrc:runs',u);}};
  const delRun=id=>{if(firebaseDB)firebaseDB.ref('cfrc/runs/'+id).remove();else{const u=runs.filter(r=>r.id!==id);setRuns(u);LS.set('cfrc:runs',u);}};

  const pendingCount=coldChainLogs.filter(l=>l.status==='pending').length;

  const screens={
    home:<HomeScreen sessions={sessions} coldChainLogs={coldChainLogs} manifests={manifests} isTracking={isTracking} elapsed={elapsed} totalMiles={totalMiles} go={setTab} runs={runs} fbMode={fbMode} config={config} onSettings={()=>setShowSettings(true)}/>,
    tracker:<TrackerScreen isTracking={isTracking} elapsed={elapsed} totalMiles={totalMiles} gpsStatus={gpsStatus} sessionStart={sessionStart} onStart={startSession} onEnd={endSession} sessions={sessions} onDel={delSession} timeOnlyMode={timeOnlyMode} config={config}/>,
    coldchain:<ColdChainScreen logs={coldChainLogs} onSave={saveCC} onUpdate={updateCC} onDel={delCC} runs={runs} config={config}/>,
    manifest:<ManifestScreen manifests={manifests} onSave={saveMf} onDel={delMf} coldChainLogs={coldChainLogs} config={config}/>,
    invoice:<InvoiceScreen sessions={sessions} coldChainLogs={coldChainLogs} manifests={manifests} config={config}/>,
  };

  // Show setup screen on first launch (or after reset)
  if(showSetup){
    return <SetupScreen onComplete={cfg=>{
      setConfig(cfg);
      setShowSetup(false);
      // Load data now that setup is done
      setSessions(LS.get('cfrc:sessions')||[]);
      setCCLogs(LS.get('cfrc:cc')||[]);
      setManifests(LS.get('cfrc:mfst')||[]);
      initFirebase();
      if(firebaseDB){setFbMode(true);firebaseDB.ref('cfrc/runs').on('value',snap=>{const data=snap.val();setRuns(data?Object.values(data):[]);});}
      else{setRuns(LS.get('cfrc:runs')||[]);}
    }}/>;
  }

  // Loading state (config not yet read from localStorage)
  if(!config){
    return <div style={{minHeight:'100vh',background:'#1B2B5E',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{color:'white',fontSize:28,fontWeight:900,letterSpacing:'-0.02em'}}>RxRunner</div>
    </div>;
  }

  return(
    <div style={{fontFamily:'-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif',background:'#EEF2FF',minHeight:'100vh',maxWidth:480,margin:'0 auto',position:'relative'}}>
      <div style={{paddingBottom:80,minHeight:'100vh'}}>{screens[tab]}</div>
      <NavBar tab={tab} onTab={setTab} isTracking={isTracking} onMgr={()=>setShowMgr(true)} pendingCount={pendingCount}/>
      {showMgr&&<DrugManagerPortal runs={runs} onSaveRun={saveRun} onDelRun={delRun} onClose={()=>setShowMgr(false)} fbMode={fbMode}/>}
      {showSettings&&<SettingsModal config={config} onSave={cfg=>{setConfig(cfg);setShowSettings(false);}} onClose={()=>setShowSettings(false)} onReset={()=>{setShowSettings(false);setShowSetup(true);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
