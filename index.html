// Haversine distance in miles between two {lat,lng} points
function haversineMi(a,b){
  const R=3958.8, toR=d=>d*Math.PI/180;
  const dLat=toR(b.lat-a.lat), dLng=toR(b.lng-a.lng);
  const x=Math.sin(dLat/2)**2+Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// Brute-force best order for ≤6 stops (max 720 permutations — instant)
function optimizeRoute(originKey, stopKeys){
  if(stopKeys.length===0)return{order:[],totalMi:0};
  if(stopKeys.length===1){
    const origin=LOC_DATA[originKey]||LOC_DATA["Orange City (Main)"];
    const dest=LOC_DATA[stopKeys[0]];
    const mi=origin&&dest?haversineMi(origin,dest):0;
    return{order:stopKeys,totalMi:mi};
  }
  const permute=arr=>{if(arr.length<=1)return[arr];return arr.flatMap((v,i)=>permute([...arr.slice(0,i),...arr.slice(i+1)]).map(p=>[v,...p]));};
  const perms=permute(stopKeys);
  let best=null,bestDist=Infinity;
  perms.forEach(perm=>{
    let dist=0,prev=LOC_DATA[originKey]||LOC_DATA["Orange City (Main)"];
    perm.forEach(k=>{if(LOC_DATA[k]){dist+=haversineMi(prev,LOC_DATA[k]);prev=LOC_DATA[k];}});
    if(dist<bestDist){bestDist=dist;best=perm;}
  });
  return{order:best,totalMi:bestDist};
}

// Open optimized route in Google Maps (falls back gracefully on iOS to Apple Maps via redirect)
function openInMaps(originKey, orderedStopKeys){
  const origin=LOC_DATA[originKey]||LOC_DATA["Orange City (Main)"];
  const stops=orderedStopKeys.map(k=>LOC_DATA[k]).filter(Boolean);
  if(stops.length===0)return;
  const dest=stops[stops.length-1];
  const waypoints=stops.slice(0,-1);
  const wStr=waypoints.map(s=>`${s.lat},${s.lng}`).join('|');
  let url=`https://www.google.com/maps/dir/?api=1`
    +`&origin=${origin.lat},${origin.lng}`
    +`&destination=${dest.lat},${dest.lng}`
    +`&travelmode=driving`;
  if(wStr)url+=`&waypoints=${encodeURIComponent(wStr)}`;
  window.open(url,'_blank');
}

const haversine=(la1,lo1,la2,lo2)=>{const R=3958.8,r=d=>d*Math.PI/180,a=Math.sin(r(la2-la1)/2)**2+Math.cos(r(la1))*Math.cos(r(la2))*Math.sin(r(lo2-lo1)/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));};
const fmtT=s=>[Math.floor(s/3600),Math.floor((s%3600)/60),s%60].map(v=>String(v).padStart(2,'0')).join(':');
const fmtDT=ts=>ts?new Date(ts).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
const fmtD=ts=>ts?new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—';
const cur=n=>`$${Number(n||0).toFixed(2)}`;
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const fmtNDC=n=>n?`${n.slice(0,5)}-${n.slice(5,9)}-${n.slice(9)}`:'';
const todayISO=()=>new Date().toISOString().slice(0,10);
const isSecure=()=>window.isSecureContext||window.location.protocol==='https:'||window.location.hostname==='localhost';

function exportLogsCSV(logs,orgShort='RxRunner'){
  const header=['Log ID','Status','Timestamp','Type','Origin','Destination','Drug Name','NDC','Lot','Exp Date','Qty','Dep Temp (°F)','Arr Temp (°F)','Excursion','Received By','Notes'];
  const rows=logs.map(l=>{
    const drugName=l.drugs?.length>0?l.drugs.map(d=>d.name).join('; '):(l.drugName||l.drug?.name||'');
    const ndc=l.drugs?.length>0?l.drugs.map(d=>fmtNDC(d.ndc)).join('; '):fmtNDC(l.ndc||l.drug?.ndc||'');
    return[l.id,l.status||'complete',fmtDT(l.pickupTimestamp||l.timestamp),l.type||'adhoc',l.origin||'Orange City (Main)',l.dest||l.stop?.location||'',
      drugName,ndc,l.form?.lot||l.lot||'',l.form?.expDate||l.expDate||'',l.qty||'',
      l.form?.depTemp||l.depTemp||'',l.form?.arrTemp||l.arrTemp||'',
      l.form?.excursion||l.excursion||'No',l.form?.rcvdBy||l.rcvdBy||'',l.form?.notes||l.notes||''
    ].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',');
  });
  const csv=[header.join(','),...rows].join('\n');

// SIGNATURE PAD
// ══════════════════════════════════════════════════════
function SigPad({label,onSave,resetKey=0}){
  const ref=useRef(null),dn=useRef(false);
  const[has,setHas]=useState(false),[saved,setSaved]=useState(false);
  useEffect(()=>{if(ref.current)ref.current.getContext('2d').clearRect(0,0,600,160);setHas(false);setSaved(false);},[resetKey]);
  const pt=(e,c)=>{const r=c.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height,t=e.touches?e.touches[0]:e;return[(t.clientX-r.left)*sx,(t.clientY-r.top)*sy];};
  const down=e=>{e.preventDefault();dn.current=true;const c=ref.current,ctx=c.getContext('2d'),[x,y]=pt(e,c);ctx.beginPath();ctx.moveTo(x,y);};
  const move=e=>{e.preventDefault();if(!dn.current)return;const c=ref.current,ctx=c.getContext('2d'),[x,y]=pt(e,c);ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle='#1B2B5E';ctx.lineTo(x,y);ctx.stroke();ctx.beginPath();ctx.moveTo(x,y);setHas(true);setSaved(false);};
  const up=()=>{dn.current=false;};
  const clear=()=>{ref.current.getContext('2d').clearRect(0,0,600,160);setHas(false);setSaved(false);};
  const save=()=>{if(has&&onSave){onSave(ref.current.toDataURL('image/png'));setSaved(true);}};
  return(
    <div style={{marginTop:8}}>
      {label&&<div style={{fontSize:12,fontWeight:600,color:'#475569',marginBottom:5}}>{label}</div>}
      <div style={{border:`1.5px solid ${saved?'#86EFAC':'#CBD5E1'}`,borderRadius:10,background:'#FAFBFF',position:'relative',overflow:'hidden'}}>
        <canvas ref={ref} width={600} height={160} style={{width:'100%',height:110,display:'block',touchAction:'none',cursor:'crosshair'}}
          onMouseDown={down} onMouseMove={move} onMouseUp={up} onMouseLeave={up}
          onTouchStart={down} onTouchMove={move} onTouchEnd={up}/>
        {!has&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}><span style={{color:'#94A3B8',fontSize:12,fontStyle:'italic'}}>Sign here with finger or mouse</span></div>}
      </div>
      <div style={{display:'flex',gap:8,marginTop:6}}>
        <button onClick={clear} style={S.btnSm}>Clear</button>
        <button onClick={save} disabled={!has} style={{...S.btnSm,flex:2,background:has?(saved?'#059669':'#1B2B5E'):'#E2E8F0',color:has?'white':'#94A3B8',border:'none',fontWeight:600}}>
          {saved?'✓ Signature Saved':has?'Save Signature':'Draw to Sign'}
        </button>
      </div>
    </div>
  );
}

// DRUG SEARCH — shows ALL 42 drugs, no slice limit
// ══════════════════════════════════════════════════════
function DrugSearch({value,ndc,onChange,onClear}){
  const[query,setQuery]=useState(value||'');
  const[open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{setQuery(value||'');},[value]);
  // Show ALL drugs when empty, ALL matches when typing (no slice limit)
  const filtered=query.trim().length===0
    ?DRUG_MASTER
    :DRUG_MASTER.filter(d=>
        d.name.toLowerCase().includes(query.toLowerCase())||
        d.ndc.includes(query.replace(/-/g,''))||
        d.mfr.toLowerCase().includes(query.toLowerCase())
      );
  const select=d=>{onChange(d);setQuery(d.name);setOpen(false);};
  const clear=()=>{setQuery('');onChange(null);onClear&&onClear();};
  const hl=(text,q)=>{if(!q.trim())return text;const i=text.toLowerCase().indexOf(q.toLowerCase());if(i===-1)return text;return<>{text.slice(0,i)}<mark style={{background:'#FEF08A',borderRadius:2,padding:'0 1px'}}>{text.slice(i,i+q.length)}</mark>{text.slice(i+q.length)}</>;};
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);},[]);
  return(
    <div ref={ref} style={{position:'relative'}}>
      <div style={{position:'relative'}}>
        <input value={query} onChange={e=>{setQuery(e.target.value);onChange(null);setOpen(true);}} onFocus={()=>setOpen(true)}
          placeholder="Search all 42 drugs — name, NDC, or manufacturer…"
          style={{...S.input,paddingRight:36,background:value?'#F0FDF4':'white',borderColor:value?'#86EFAC':'#CBD5E1'}}/>
        {(query||value)&&<button onClick={clear} style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'#94A3B8',cursor:'pointer',fontSize:16,padding:2}}>✕</button>}
      </div>
      {open&&filtered.length>0&&(
        <div style={{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,background:'white',borderRadius:12,boxShadow:'0 8px 24px rgba(0,0,0,0.15)',zIndex:999,maxHeight:280,overflowY:'auto',border:'1px solid #E2E8F0'}}>
          {query.trim().length===0&&<div style={{padding:'8px 14px 4px',fontSize:10,fontWeight:700,color:'#94A3B8',textTransform:'uppercase',letterSpacing:'0.06em',position:'sticky',top:0,background:'white',borderBottom:'1px solid #F1F5F9'}}>All {DRUG_MASTER.length} Drugs — scroll or type to filter</div>}
          {filtered.map(d=>(
            <div key={d.ndc} onClick={()=>select(d)} style={{padding:'10px 14px',cursor:'pointer',borderBottom:'1px solid #F8FAFC'}}
              onMouseEnter={e=>e.currentTarget.style.background='#F0F9FF'}
              onMouseLeave={e=>e.currentTarget.style.background='white'}>
              <div style={{fontSize:13,fontWeight:600,color:'#1E293B'}}>{hl(d.name,query)}</div>
              <div style={{display:'flex',gap:10,marginTop:2}}>
                <span style={{fontSize:11,color:'#64748B',fontFamily:'monospace'}}>{fmtNDC(d.ndc)}</span>
                <span style={{fontSize:11,color:'#94A3B8'}}>{d.mfr}</span>
              </div>
            </div>
          ))}
        </div>
      )}
      {value&&ndc&&(
        <div style={{marginTop:5,display:'flex',gap:8,alignItems:'center'}}>
          <div style={{fontSize:11,background:'#F0FDF4',border:'1px solid #86EFAC',borderRadius:6,padding:'3px 8px',color:'#065F46',fontFamily:'monospace',fontWeight:600}}>NDC: {fmtNDC(ndc)}</div>
          {DRUG_MASTER.find(d=>d.ndc===ndc)?.mfr&&<div style={{fontSize:11,color:'#64748B'}}>{DRUG_MASTER.find(d=>d.ndc===ndc).mfr}</div>}
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════
// COLD CHAIN SCREEN
// Tabs: Planned Runs | ⏳ In Progress | Ad-Hoc | History
// ══════════════════════════════════════════════════════
function ColdChainScreen({logs,onSave,onUpdate,onDel,runs,config}){
  const todayRuns=runs.filter(r=>r.date>=todayISO()).sort((a,b)=>a.date.localeCompare(b.date));
  const pendingLogs=logs.filter(l=>l.status==='pending');
  const completeLogs=logs.filter(l=>l.status==='complete');

  const[view,setView]=useState('runs');
  // Run execution state
  const[selRun,setSelRun]=useState(null),[selStop,setSelStop]=useState(null);
  const[phase,setPhase]=useState('pickup'),[form,setForm]=useState({});
  const[sigKey,setSigKey]=useState(0),[runSaved,setRunSaved]=useState(false);
  // Completing a pending log
  const[completingLog,setCompletingLog]=useState(null);
  const[compForm,setCompForm]=useState({arrTemp:'',excursion:'No',rcvdBy:'',deliverySig:null});
  const[compSigKey,setCompSigKey]=useState(0);

  const newBlankDrug=()=>({id:uid(),drug:null,qty:'',lot:'',expDate:''});
  // Ad-hoc state
  const blankAdhoc={origin:LOCS[0],dest:'',drugs:[newBlankDrug()],depTemp:'',pickupSig:null,notes:''};
  const[adhoc,setAdhoc]=useState(blankAdhoc),[adhocSaved,setAdhocSaved]=useState(false),[adhocSigKey,setAdhocSigKey]=useState(0);

  const setF=(k,v)=>setForm(p=>({...p,[k]:v}));
  const setCF=(k,v)=>setCompForm(p=>({...p,[k]:v}));
  const setA=(k,v)=>setAdhoc(p=>({...p,[k]:v}));
  const setDrugField=(idx,field,val)=>setAdhoc(p=>({...p,drugs:p.drugs.map((d,i)=>i===idx?{...d,[field]:val}:d)}));
  const removeDrug=idx=>setAdhoc(p=>({...p,drugs:p.drugs.filter((_,i)=>i!==idx)}));
  const addDrug=()=>setAdhoc(p=>({...p,drugs:[...p.drugs,newBlankDrug()]}));

  // Save pickup phase → pending log
  const saveRunPickup=()=>{
    if(!form.depTemp){alert('Enter departure temperature.');return;}
    if(!form.dispStaffName){alert('Enter dispensing staff name.');return;}
    if(!form.pickupSig){alert('Dispensing staff must sign before saving.');return;}
    const log={id:uid(),status:'pending',type:'run',runId:selRun.id,runDate:selRun.date,stop:selStop,
      origin:'Orange City (Main)',dest:selStop.location,drugs:selStop.drugs,
      form:{...form},pickupTimestamp:Date.now(),completedTimestamp:null};
    onSave(log);
    setRunSaved(true);setTimeout(()=>{setRunSaved(false);setView('runs');setSelRun(null);setSelStop(null);},2000);
  };
  // Complete delivery (from In Progress)
  const completeLog=()=>{
    if(!compForm.arrTemp){alert('Enter arrival temperature.');return;}
    if(!compForm.rcvdBy){alert('Enter receiver name.');return;}
    if(!compForm.deliverySig){alert('Receiver must sign to complete.');return;}
    onUpdate(completingLog.id,{...compForm,status:'complete',completedTimestamp:Date.now()});
    setCompletingLog(null);setView('inprogress');
  };

  // Save ad-hoc as pending (pickup only)
  const saveAdhocPickup=()=>{
    if(!adhoc.dest){alert('Select a destination.');return;}
    const invalidDrug=adhoc.drugs.find(d=>!d.drug||!d.qty);
    if(invalidDrug){alert('Select a drug and enter quantity for each drug row.');return;}
    if(!adhoc.depTemp){alert('Enter departure temperature.');return;}
    if(!adhoc.dispStaffName){alert('Enter dispensing staff name.');return;}
    if(!adhoc.pickupSig){alert('Dispensing staff must sign at pickup.');return;}
    const log={id:uid(),status:'pending',type:'adhoc',origin:adhoc.origin,dest:adhoc.dest,
      drugs:adhoc.drugs.map(d=>({name:d.drug.name,ndc:d.drug.ndc,mfr:d.drug.mfr,qty:d.qty,lot:d.lot,expDate:d.expDate})),
      depTemp:adhoc.depTemp,dispStaffName:adhoc.dispStaffName,pickupSig:adhoc.pickupSig,notes:adhoc.notes,
      pickupTimestamp:Date.now(),completedTimestamp:null};
    onSave(log);
    setAdhoc(blankAdhoc);setAdhocSaved(true);setAdhocSigKey(k=>k+1);
    setTimeout(()=>{setAdhocSaved(false);setView('inprogress');},2000);
  };

  const startRunStop=(run,stop)=>{setSelRun(run);setSelStop(stop);setPhase('pickup');setForm({depTemp:'',pickupSig:null,lot:'',expDate:'',notes:''});setSigKey(k=>k+1);setView('execute');};
  const openComplete=log=>{setCompletingLog(log);setCompForm({arrTemp:'',excursion:'No',rcvdBy:'',deliverySig:null});setCompSigKey(k=>k+1);setView('completing');};

  const excursionWarning=ex=>ex==='Yes'&&(
    <div style={{background:'#FEF2F2',border:'2px solid #FECACA',borderRadius:10,padding:'12px 14px',marginBottom:12,color:'#991B1B',fontSize:13,fontWeight:700}}>
      ⚠️ TEMPERATURE EXCURSION — Notify {config?.orgName||'your organization'} immediately. Do NOT deliver without written authorization.
    </div>
  );

  const tabCounts={runs:todayRuns.length,inprogress:pendingLogs.length,adhoc:null,history:completeLogs.length};
  const tabLabels=[['runs',`Upcoming (${tabCounts.runs})`],['inprogress',pendingLogs.length>0?`⏳ Pending (${pendingLogs.length})`:'In Progress'],['adhoc','Ad-Hoc'],['history',`History (${completeLogs.length})`]];

  return(
    <div style={{paddingBottom:90}}>
      <div style={{background:'linear-gradient(135deg,#0C4A6E,#0369A1)',padding:'40px 20px 16px',color:'white'}}>
        <div style={{fontSize:10,opacity:0.6,textTransform:'uppercase',letterSpacing:'0.08em'}}>Pharmaceutical Transport</div>
        <div style={{fontSize:24,fontWeight:900,letterSpacing:'-0.02em',marginTop:4}}>Cold Chain Log</div>
        <div style={{display:'flex',gap:6,marginTop:14,flexWrap:'wrap'}}>
          {tabLabels.map(([v,l])=>(
            <button key={v} onClick={()=>{setView(v);setSelRun(null);setSelStop(null);setCompletingLog(null);}} style={{...S.pill(view===v||view==='execute'&&v==='runs'||view==='completing'&&v==='inprogress'),fontSize:11}}>{l}</button>
          ))}
        </div>
      </div>

      {/* ─── PLANNED RUNS ─── */}
      {view==='runs'&&(
        <div style={{padding:'14px'}}>
          {todayRuns.length===0
            ?<div style={{textAlign:'center',padding:'50px 20px',color:'#94A3B8'}}>
                <div style={{fontSize:36,marginBottom:12}}>📦</div>
                <div style={{fontSize:14,fontWeight:600,marginBottom:6}}>No upcoming runs</div>
                <div style={{fontSize:12}}>Drug Manager can upload an Excel file or create runs manually.</div>
                <button onClick={()=>setView('adhoc')} style={{marginTop:14,background:'#0369A1',border:'none',borderRadius:10,color:'white',fontSize:13,fontWeight:600,padding:'10px 20px',cursor:'pointer',fontFamily:'inherit'}}>Ad-Hoc Entry</button>
              </div>
            :<>
              <div style={{background:'#F0F9FF',border:'1px solid #BAE6FD',borderRadius:10,padding:'11px 13px',marginBottom:12,fontSize:12,color:'#0369A1',lineHeight:1.5}}>
                <strong>📋 Before leaving:</strong> Go to the <strong>Manifest tab</strong> to complete your departure checklist and get the dispensing staff signature.
              </div>
              {todayRuns.map(run=>{
                const isToday=run.date===todayISO();
                const isTomorrow=run.date===new Date(Date.now()+86400000).toISOString().slice(0,10);
                const dateLabel=isToday?'TODAY':isTomorrow?'TOMORROW':new Date(run.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
                return(
              <div key={run.id} style={{...S.card,opacity:isToday?1:0.85}}>
                <div style={{...S.hdiv,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span>Run: {new Date(run.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
                  <div style={{display:'flex',gap:6,alignItems:'center'}}>
                    <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:20,background:isToday?'#DCFCE7':isTomorrow?'#FEF3C7':'#F1F5F9',color:isToday?'#059669':isTomorrow?'#D97706':'#64748B'}}>{dateLabel}</span>
                    <span style={{fontWeight:400,fontSize:12,color:'#94A3B8'}}>{run.stops.length} stop{run.stops.length!==1?'s':''}</span>
                  </div>
                </div>
                {run.stops.map((stop,si)=>{
                  const done=logs.some(l=>l.runId===run.id&&l.stop?.location===stop.location);
                  const pending=logs.some(l=>l.runId===run.id&&l.stop?.location===stop.location&&l.status==='pending');
                  return(
                    <div key={si} style={{marginBottom:10,borderRadius:10,border:`1px solid ${done?(pending?'#FDE68A':'#86EFAC'):'#E2E8F0'}`,padding:'12px',background:done?(pending?'#FFFBEB':'#F0FDF4'):'#FAFBFF'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                        <div>
                          <div style={{fontSize:13,fontWeight:700,color:'#1E293B'}}>Stop {si+1}: {stop.location}</div>
                          <div style={{fontSize:11,color:'#64748B',marginTop:2}}>{stop.drugs.length} drug{stop.drugs.length!==1?'s':''}</div>
                        </div>
                        {!done&&<button onClick={()=>startRunStop(run,stop)} style={{background:'#0369A1',border:'none',borderRadius:8,color:'white',fontSize:12,fontWeight:600,padding:'7px 14px',cursor:'pointer',fontFamily:'inherit'}}>Start →</button>}
                        {pending&&<span style={{fontSize:11,fontWeight:700,color:'#D97706',background:'#FEF3C7',padding:'3px 8px',borderRadius:20}}>⏳ Pickup saved</span>}
                        {done&&!pending&&<span style={{fontSize:11,fontWeight:700,color:'#059669',background:'#DCFCE7',padding:'3px 8px',borderRadius:20}}>✓ Complete</span>}
                      </div>
                      {stop.drugs.map((d,di)=>(
                        <div key={di} style={{fontSize:12,color:'#475569',padding:'3px 0',borderTop:di>0?'1px solid #F1F5F9':'none'}}>
                          <span style={{fontWeight:500}}>{d.name}</span>
                          {d.ndc&&<span style={{fontFamily:'monospace',color:'#94A3B8',marginLeft:8,fontSize:11}}>{fmtNDC(d.ndc)}</span>}
                          {d.qty&&<span style={{color:'#94A3B8',marginLeft:8}}>Qty: {d.qty}</span>}
                        </div>
                      ))}
                    </div>
                  );
                })}
              </div>
            );})}
            </>
          }
        </div>
      )}

      {/* ─── RUN EXECUTE ─── */}
      {view==='execute'&&selRun&&selStop&&(
        <div style={{padding:'14px'}}>
          {runSaved&&<div style={{background:'#ECFDF5',border:'1px solid #6EE7B7',borderRadius:10,padding:'12px 14px',marginBottom:12,color:'#065F46',fontSize:13,fontWeight:700}}>✓ Pickup saved for {selStop.location} — complete delivery when you arrive</div>}
          <div style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:10,padding:'10px 14px',marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:'#1E40AF',textTransform:'uppercase',letterSpacing:'0.06em'}}>📦 Pickup Verification — Orange City</div>
            <div style={{fontSize:12,color:'#1E40AF',marginTop:3}}>Destination: <strong>{selStop.location}</strong></div>
          </div>
          <div style={S.card}>
            <div style={S.hdiv}>Drugs in This Stop</div>
            {selStop.drugs.map((d,i)=>(
              <div key={i} style={{padding:'8px 0',borderBottom:'1px solid #F1F5F9'}}><div style={{fontSize:13,fontWeight:600,color:'#1E293B'}}>{d.name}</div><div style={{fontSize:11,color:'#94A3B8',fontFamily:'monospace'}}>{fmtNDC(d.ndc)}{d.qty&&` · Qty: ${d.qty}`}</div></div>
            ))}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:12}}>
              <FR label="Lot # (opt)"><TIn value={form.lot||''} onChange={v=>setF('lot',v)} placeholder="Lot #"/></FR>
              <FR label="Exp Date (opt)"><TIn type="date" value={form.expDate||''} onChange={v=>setF('expDate',v)}/></FR>
            </div>
          </div>
          <div style={S.card}>
            <div style={S.hdiv}>Departure Temp & Pickup Signature</div>
            <FR label="Departure Temp (°F)" req><TIn type="number" value={form.depTemp||''} onChange={v=>setF('depTemp',v)} placeholder="e.g. 39.2"/></FR>
            <FR label="Dispensing Staff (Print Name)" req><TIn value={form.dispStaffName||''} onChange={v=>setF('dispStaffName',v)} placeholder="Full name of dispensing staff"/></FR>
            <FR label="Notes"><TIn value={form.notes||''} onChange={v=>setF('notes',v)} placeholder="Observations at pickup"/></FR>
            <SigPad label="Dispensing Staff Signature — Orange City" onSave={sig=>setF('pickupSig',sig)} resetKey={sigKey}/>
            <button onClick={saveRunPickup} style={{...S.btnP,marginTop:16,background:'linear-gradient(135deg,#0C4A6E,#0369A1)'}}>💾 Save Pickup — Complete at Destination</button>
            <div style={{fontSize:11,color:'#94A3B8',textAlign:'center',marginTop:6}}>Saves as "Pending." Go to ⏳ In Progress tab to complete at {selStop.location}.</div>
          </div>
          <button onClick={()=>{setView('runs');setSelRun(null);setSelStop(null);}} style={{...S.btnSm,width:'100%',padding:'12px',textAlign:'center',marginTop:4}}>← Back to Runs</button>
        </div>
      )}

      {/* ─── IN PROGRESS (pending) ─── */}
      {view==='inprogress'&&(
        <div style={{padding:'14px'}}>
          {pendingLogs.length===0
            ?<div style={{textAlign:'center',padding:'60px 20px',color:'#94A3B8'}}>
                <div style={{fontSize:40,marginBottom:12}}>⏳</div>
                <div style={{fontSize:14,fontWeight:600,marginBottom:6}}>No pending logs</div>
                <div style={{fontSize:12}}>Pickup-saved logs appear here. Open at the destination to add arrival temp and receiver signature.</div>
              </div>
            :pendingLogs.map(l=>(
              <div key={l.id} style={{background:'white',borderRadius:12,padding:'14px',marginBottom:10,boxShadow:'0 1px 4px rgba(0,0,0,0.07)',borderLeft:'4px solid #F59E0B'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                  <div>
                    <div style={{fontSize:14,fontWeight:700,color:'#1E293B'}}>{l.dest}</div>
                    <div style={{fontSize:11,color:'#94A3B8',marginTop:2}}>Pickup: {fmtDT(l.pickupTimestamp)} · Dep: {l.form?.depTemp||l.depTemp}°F</div>
                    <div style={{fontSize:11,color:'#94A3B8',marginTop:1}}>{(l.drugs||[]).length} drug{(l.drugs||[]).length!==1?'s':''}: {(l.drugs||[]).map(d=>d.name.split(' ')[0]).join(', ')}</div>
                  </div>
                  <span style={{fontSize:10,fontWeight:700,color:'#D97706',background:'#FEF3C7',padding:'3px 8px',borderRadius:20,whiteSpace:'nowrap'}}>⏳ Pickup Done</span>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button onClick={()=>openComplete(l)} style={{flex:1,background:'#0369A1',border:'none',borderRadius:8,color:'white',fontSize:12,fontWeight:600,padding:'9px',cursor:'pointer',fontFamily:'inherit'}}>✏️ Complete at {l.dest.replace('Kissimmee — ','')}</button>
                  <button onClick={()=>printDeliveryLog(l,config?.orgName)} style={{background:'#1B2B5E',border:'none',borderRadius:8,color:'white',fontSize:11,fontWeight:600,padding:'9px 10px',cursor:'pointer',fontFamily:'inherit'}}>🖨</button>
                </div>
              </div>
            ))
          }
        </div>
      )}

      {/* ─── COMPLETING A PENDING LOG ─── */}
      {view==='completing'&&completingLog&&(
        <div style={{padding:'14px'}}>
          {excursionWarning(compForm.excursion)}
          <div style={{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:10,padding:'10px 14px',marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:'#D97706',textTransform:'uppercase',letterSpacing:'0.06em'}}>🏥 Step 2: Delivery Verification</div>
            <div style={{fontSize:12,color:'#92400E',marginTop:3}}>Delivering to: <strong>{completingLog.dest}</strong></div>
          </div>
          <div style={S.card}>
            <div style={S.hdiv}>Drugs</div>
            {(completingLog.drugs||[]).map((d,i)=>(
              <div key={i} style={{padding:'7px 0',borderBottom:'1px solid #F1F5F9'}}><span style={{fontSize:13,fontWeight:600}}>{d.name}</span><span style={{fontSize:11,color:'#94A3B8',marginLeft:8,fontFamily:'monospace'}}>{fmtNDC(d.ndc)}</span>{d.qty&&<span style={{fontSize:11,color:'#94A3B8',marginLeft:8}}>Qty: {d.qty}</span>}</div>
            ))}
          </div>
          <div style={S.card}>
            <div style={S.hdiv}>Arrival Details</div>
            <FR label="Arrival Temp (°F)" req><TIn type="number" value={compForm.arrTemp} onChange={v=>setCF('arrTemp',v)} placeholder="e.g. 40.1"/></FR>
            <FR label="Excursion?">
              <div style={{display:'flex',gap:8}}>
                {['No','Yes'].map(v=>(
                  <button key={v} onClick={()=>setCF('excursion',v)} style={{flex:1,padding:'11px',border:'1.5px solid',borderColor:compForm.excursion===v?(v==='Yes'?'#EF4444':'#10B981'):'#CBD5E1',borderRadius:8,background:compForm.excursion===v?(v==='Yes'?'#FEF2F2':'#F0FDF4'):'white',color:compForm.excursion===v?(v==='Yes'?'#DC2626':'#059669'):'#64748B',fontWeight:700,cursor:'pointer',fontFamily:'inherit',fontSize:14}}>
                    {v==='No'?'✓ No':'⚠ Yes'}
                  </button>
                ))}
              </div>
            </FR>
            <FR label="Received By (Print Name)" req><TIn value={compForm.rcvdBy} onChange={v=>setCF('rcvdBy',v)} placeholder="Receiving staff member name"/></FR>
            <SigPad label={`Receiver Signature — ${completingLog.dest}`} onSave={sig=>setCF('deliverySig',sig)} resetKey={compSigKey}/>
            <button onClick={completeLog} style={{...S.btnP,marginTop:16,background:'linear-gradient(135deg,#059669,#047857)'}}>✓ Complete & Save Delivery Log</button>
          </div>
          <button onClick={()=>{setView('inprogress');setCompletingLog(null);}} style={{...S.btnSm,width:'100%',padding:'12px',textAlign:'center',marginTop:4}}>← Back to In Progress</button>
        </div>
      )}

      {/* ─── AD-HOC ─── */}
      {view==='adhoc'&&(
        <div style={{padding:'14px'}}>
          {adhocSaved&&<div style={{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:10,padding:'12px 14px',marginBottom:12,color:'#92400E',fontSize:13,fontWeight:600}}>✓ Pickup saved as Pending — go to ⏳ In Progress tab to complete at destination</div>}
          <div style={{background:'#F0F9FF',border:'1px solid #BAE6FD',borderRadius:10,padding:'10px 14px',marginBottom:12}}>
            <div style={{fontSize:12,color:'#0369A1',fontWeight:600}}>📋 Workflow: Fill out pickup info here → Dispatching staff signs → Save → Complete arrival at destination from ⏳ In Progress tab</div>
          </div>
          <div style={S.card}>
            <div style={S.hdiv}>Route</div>
            <FR label="Origin"><Sel value={adhoc.origin} onChange={v=>setA('origin',v)} options={LOCS}/></FR>
            <FR label="Destination" req><Sel value={adhoc.dest} onChange={v=>setA('dest',v)} options={['',...LOCS.filter(l=>l!==adhoc.origin)]} ph="Select destination"/></FR>
          </div>
          <div style={S.card}>
            <div style={S.hdiv}>Drugs <span style={{fontSize:11,fontWeight:400,color:'#94A3B8'}}>({adhoc.drugs.length} added)</span></div>
            {adhoc.drugs.map((drug,idx)=>(
              <DrugRow key={drug.id} drug={drug} idx={idx}
                onChange={(field,val)=>setDrugField(idx,field,val)}
                onRemove={()=>removeDrug(idx)}
                showRemove={adhoc.drugs.length>1}/>
            ))}
            <button onClick={addDrug} style={{...S.btnSm,width:'100%',color:'#0369A1',borderColor:'#BAE6FD',background:'#F0F9FF',fontWeight:600,padding:'10px',marginTop:4}}>+ Add Another Drug</button>
          </div>
          <div style={S.card}>
            <div style={S.hdiv}>Pickup Details</div>
            <FR label="Departure Temp (°F)" req><TIn type="number" value={adhoc.depTemp} onChange={v=>setA('depTemp',v)} placeholder="e.g. 39.2"/></FR>
            <FR label="Dispensing Staff (Print Name)" req><TIn value={adhoc.dispStaffName||''} onChange={v=>setA('dispStaffName',v)} placeholder="Full name of dispensing staff"/></FR>
            <FR label="Notes"><TIn value={adhoc.notes} onChange={v=>setA('notes',v)} placeholder="Observations at pickup"/></FR>
            <SigPad label="Dispensing Staff Signature — Orange City (Pickup)" onSave={sig=>setA('pickupSig',sig)} resetKey={adhocSigKey}/>
            <button onClick={saveAdhocPickup} style={{...S.btnP,marginTop:16,background:'linear-gradient(135deg,#0C4A6E,#0369A1)'}}>💾 Save Pickup — Complete Delivery Later</button>
          </div>
        </div>
      )}

      {/* ─── HISTORY ─── */}
      {view==='history'&&(
        <div style={{padding:'14px'}}>
          {completeLogs.length>0&&(
            <div style={{display:'flex',gap:8,marginBottom:12}}>
              <button onClick={()=>exportLogsCSV(completeLogs,config?.orgShort)} style={{flex:1,padding:'10px',background:'white',border:'1px solid #CBD5E1',borderRadius:10,fontSize:12,fontWeight:600,color:'#475569',cursor:'pointer',fontFamily:'inherit'}}>⬇ Export All CSV</button>
              <button onClick={()=>exportLogsCSV(logs,config?.orgShort)} style={{flex:1,padding:'10px',background:'white',border:'1px solid #CBD5E1',borderRadius:10,fontSize:12,fontWeight:600,color:'#475569',cursor:'pointer',fontFamily:'inherit'}}>⬇ Export All (incl. pending)</button>
            </div>
          )}
          {completeLogs.length===0
            ?<div style={{textAlign:'center',padding:'60px 20px',color:'#94A3B8'}}><div style={{fontSize:40,marginBottom:12}}>🌡</div><div>No completed logs yet</div></div>
            :[...completeLogs].reverse().map(l=>(
              <div key={l.id} style={{background:'white',borderRadius:12,padding:'14px',marginBottom:10,boxShadow:'0 1px 3px rgba(0,0,0,0.05)',borderLeft:`3px solid ${(l.form?.excursion||l.excursion)==='Yes'?'#EF4444':'#0369A1'}`}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:700,color:'#1E293B'}}>{l.dest||l.stop?.location}</div>
                    <div style={{fontSize:12,color:'#475569',marginTop:2}}>
                      {(l.drugs||[]).map(d=><span key={d.ndc} style={{display:'inline-block',marginRight:8}}>{d.name.split(' ').slice(0,2).join(' ')}{d.qty?` ×${d.qty}`:''}</span>)}
                    </div>
                    <div style={{fontSize:12,color:'#475569',marginTop:2}}>Dep: {l.form?.depTemp||l.depTemp}°F · Arr: {l.form?.arrTemp||l.arrTemp}°F</div>
                    {(l.form?.excursion||l.excursion)==='Yes'&&<div style={{fontSize:11,fontWeight:700,color:'#DC2626',marginTop:4}}>⚠ EXCURSION FLAGGED</div>}
                    <div style={{fontSize:11,color:'#94A3B8',marginTop:4}}>{fmtDT(l.pickupTimestamp||l.timestamp)} · Rcvd: {l.form?.rcvdBy||l.rcvdBy}</div>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:6,flexShrink:0,marginLeft:8}}>
                    <button onClick={()=>printDeliveryLog(l,config?.orgName)} style={{background:'#1B2B5E',border:'none',borderRadius:7,color:'white',fontSize:11,fontWeight:600,padding:'6px 10px',cursor:'pointer',fontFamily:'inherit'}}>🖨 Print</button>
                    <button onClick={()=>onDel(l.id)} style={{background:'none',border:'1px solid #FECACA',borderRadius:7,color:'#EF4444',cursor:'pointer',fontSize:11,padding:'5px 10px',fontFamily:'inherit'}}>Delete</button>
                  </div>
                </div>
              </div>
            ))
          }
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════
// MANIFEST SCREEN — Build from Cold Chain Logs + Manual + History
// ══════════════════════════════════════════════════════
function ManifestScreen({manifests,onSave,onDel,coldChainLogs,config}){
  const[view,setView]=useState('build');
  const[sigKey,setSigKey]=useState(0);

  // ── Build state ──────────────────────────────────
  const[buildDate,setBuildDate]=useState(todayISO());
  const[selectedLogIds,setSelectedLogIds]=useState({});
  const[buildStaff,setBuildStaff]=useState('');
  const[buildDispSig,setBuildDispSig]=useState(null);
  const[buildCtrSig,setBuildCtrSig]=useState(null);
  const[buildSaved,setBuildSaved]=useState(false);

  // Logs for selected date
  const logsForDate=coldChainLogs.filter(l=>{
    const ts=l.pickupTimestamp||l.timestamp;
    return ts&&new Date(ts).toISOString().slice(0,10)===buildDate;
  }).sort((a,b)=>(a.pickupTimestamp||a.timestamp)-(b.pickupTimestamp||b.timestamp));

  // Group by destination
  const logsByDest={};
  logsForDate.forEach(l=>{
    const d=l.dest||l.stop?.location||'Unknown';
    if(!logsByDest[d])logsByDest[d]=[];
    logsByDest[d].push(l);
  });

  const selectedLogs=logsForDate.filter(l=>selectedLogIds[l.id]);
  const toggleLog=id=>setSelectedLogIds(p=>({...p,[id]:!p[id]}));
  const toggleAllForDest=dest=>{
    const dl=logsByDest[dest]||[];
    const allSel=dl.every(l=>selectedLogIds[l.id]);
    const u={};dl.forEach(l=>{u[l.id]=!allSel;});
    setSelectedLogIds(p=>({...p,...u}));
  };
  const selectAll=()=>{const u={};logsForDate.forEach(l=>{u[l.id]=true;});setSelectedLogIds(u);};
  const clearAll=()=>setSelectedLogIds({});

  // Build consolidated stops — computed once
  const builtStops=(()=>{
    const byDest={};
    selectedLogs.forEach(l=>{
      const dest=l.dest||l.stop?.location||'Unknown';
      if(!byDest[dest])byDest[dest]={dest,drugs:[],depTemp:l.form?.depTemp||l.depTemp||'',arrTemp:l.form?.arrTemp||l.arrTemp||'',excursion:l.form?.excursion||'No'};
      (l.drugs||l.stop?.drugs||[]).forEach(d=>{
        byDest[dest].drugs.push({name:d.name,ndc:d.ndc,qty:d.qty,lot:d.lot||l.form?.lot||'',expDate:d.expDate||l.form?.expDate||''});
      });
    });
    return Object.values(byDest);
  })();

  // Route — computed once
  const routeStopKeys=[...new Set(builtStops.map(s=>s.dest))].filter(k=>LOC_DATA[k]);
  const unknownStops=builtStops.map(s=>s.dest).filter(k=>!LOC_DATA[k]);
  const routeResult=routeStopKeys.length>0?optimizeRoute('Orange City (Main)',routeStopKeys):null;
  const orderedKeys=routeResult?.order||routeStopKeys;
  const totalDrugsSelected=builtStops.reduce((a,s)=>a+s.drugs.length,0);

  const saveCompiled=()=>{
    if(selectedLogs.length===0){alert('Select at least one cold chain log.');return;}
    if(!buildStaff){alert('Enter dispensing staff name.');return;}
    onSave({id:uid(),type:'compiled',origin:'Orange City (Main)',date:buildDate,stops:builtStops,
      dispStaff:buildStaff,dispSig:buildDispSig,ctrSig:buildCtrSig,
      logIds:selectedLogs.map(l=>l.id),timestamp:Date.now()});
    setBuildSaved(true);setSigKey(k=>k+1);setBuildDispSig(null);setBuildCtrSig(null);
    setBuildStaff('');setSelectedLogIds({});
    setTimeout(()=>setBuildSaved(false),3000);
  };
  const printCompiled=()=>{
    if(selectedLogs.length===0){alert('Select at least one cold chain log to print.');return;}
    printManifest({type:'compiled',origin:'Orange City (Main)',date:buildDate,stops:builtStops,
      dispStaff:buildStaff,dispSig:buildDispSig,ctrSig:buildCtrSig,timestamp:Date.now()},config?.orgName);
  };

  // ── Manual checklist state ────────────────────────
  const blank={origin:LOCS[0],dest:'',checks:{},dispStaff:'',dispSig:null,ctrSig:null};
  const[f,setF]=useState(blank);
  const[manSaved,setManSaved]=useState(false);
  const[manSigKey,setManSigKey]=useState(0);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const toggle=i=>setF(p=>({...p,checks:{...p.checks,[i]:!p.checks[i]}}));
  const cnt=Object.values(f.checks).filter(Boolean).length,allDone=cnt===CHECKLIST.length;
  const submitManual=()=>{
    if(!f.dest){alert('Select a destination.');return;}
    if(!allDone){alert(`Complete all ${CHECKLIST.length} items.`);return;}
    if(!f.dispStaff){alert('Enter dispensing staff name.');return;}
    onSave({...f,type:'manual',timestamp:Date.now()});
    setF(blank);setManSaved(true);setManSigKey(k=>k+1);
    setTimeout(()=>setManSaved(false),3000);
  };

  return(
    <div style={{paddingBottom:90}}>
      <div style={{background:'linear-gradient(135deg,#4C1D95,#6D28D9)',padding:'40px 20px 16px',color:'white'}}>
        <div style={{fontSize:10,opacity:0.6,textTransform:'uppercase',letterSpacing:'0.08em'}}>Chain of Custody</div>
        <div style={{fontSize:24,fontWeight:900,letterSpacing:'-0.02em',marginTop:4}}>Delivery Manifest</div>
        <div style={{display:'flex',gap:6,marginTop:14,flexWrap:'wrap'}}>
          {[['build','Build from Logs'],['manual','Manual Checklist'],['history',`History (${manifests.length})`]].map(([v,l])=>(
            <button key={v} onClick={()=>setView(v)} style={{...S.pill(view===v),fontSize:11}}>{l}</button>
          ))}
        </div>
      </div>

      {/* ─── BUILD FROM LOGS ─── */}
      {view==='build'&&(
        <div style={{padding:'14px'}}>
          {buildSaved&&<div style={{background:'#F5F3FF',border:'1px solid #DDD6FE',borderRadius:10,padding:'12px 14px',marginBottom:12,color:'#5B21B6',fontSize:13,fontWeight:600}}>✓ Manifest saved to History</div>}

          <div style={S.card}>
            <div style={S.hdiv}>Select Delivery Date</div>
            <input type="date" value={buildDate} onChange={e=>{setBuildDate(e.target.value);setSelectedLogIds({});}} style={{...S.input,marginBottom:0}}/>
          </div>

          <div style={S.card}>
            <div style={{...S.hdiv,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span>Logs for {new Date(buildDate+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>
              {logsForDate.length>0&&(
                <div style={{display:'flex',gap:6}}>
                  <button onClick={selectAll} style={{fontSize:10,padding:'3px 8px',border:'1px solid #CBD5E1',borderRadius:6,background:'white',cursor:'pointer',fontFamily:'inherit',color:'#475569'}}>All</button>
                  <button onClick={clearAll} style={{fontSize:10,padding:'3px 8px',border:'1px solid #CBD5E1',borderRadius:6,background:'white',cursor:'pointer',fontFamily:'inherit',color:'#475569'}}>None</button>
                </div>
              )}
            </div>

            {logsForDate.length===0
              ?<div style={{textAlign:'center',padding:'30px 16px',color:'#94A3B8'}}>
                  <div style={{fontSize:28,marginBottom:8}}>📭</div>
                  <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>No cold chain logs for this date</div>
                  <div style={{fontSize:12}}>Complete cold chain pickups first, or select a different date.</div>
                </div>
              :Object.entries(logsByDest).map(([dest,destLogs])=>{
                const allSel=destLogs.every(l=>selectedLogIds[l.id]);
                const someSel=destLogs.some(l=>selectedLogIds[l.id]);
                const totalDestDrugs=destLogs.reduce((a,l)=>(l.drugs||l.stop?.drugs||[]).length+a,0);
                return(
                  <div key={dest} style={{marginBottom:10,borderRadius:10,border:`2px solid ${allSel?'#7C3AED':someSel?'#C4B5FD':'#E2E8F0'}`,overflow:'hidden'}}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 12px',background:allSel?'#F5F3FF':someSel?'#FAF5FF':'#F8FAFC',borderBottom:`1px solid ${allSel?'#C4B5FD':'#E2E8F0'}`}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:700,color:'#1E293B'}}>{dest}</div>
                        <div style={{fontSize:11,color:'#64748B'}}>{destLogs.length} log{destLogs.length!==1?'s':''} · {totalDestDrugs} drug{totalDestDrugs!==1?'s':''}</div>
                      </div>
                      <button onClick={()=>toggleAllForDest(dest)} style={{fontSize:11,padding:'4px 10px',border:`1px solid ${allSel?'#7C3AED':'#CBD5E1'}`,borderRadius:20,background:allSel?'#7C3AED':'white',color:allSel?'white':'#475569',cursor:'pointer',fontFamily:'inherit',fontWeight:600,flexShrink:0}}>
                        {allSel?'✓ Selected':'Select All'}
                      </button>
                    </div>
                    {destLogs.map(l=>{
                      const sel=!!selectedLogIds[l.id];
                      const drugs=l.drugs||l.stop?.drugs||[];
                      const isPending=l.status==='pending';
                      return(
                        <div key={l.id} onClick={()=>toggleLog(l.id)} style={{display:'flex',alignItems:'flex-start',gap:10,padding:'10px 12px',background:sel?'#FAFAFF':'white',cursor:'pointer',borderBottom:'1px solid #F1F5F9'}}>
                          <div style={{width:20,height:20,borderRadius:5,border:`2px solid ${sel?'#7C3AED':'#CBD5E1'}`,background:sel?'#7C3AED':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}>
                            {sel&&<span style={{color:'white',fontSize:11,fontWeight:900}}>✓</span>}
                          </div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap',marginBottom:3}}>
                              <span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:20,background:isPending?'#FEF3C7':'#DCFCE7',color:isPending?'#D97706':'#059669'}}>
                                {isPending?'⏳ Pickup Only':'✓ Complete'}
                              </span>
                              <span style={{fontSize:11,color:'#64748B'}}>{fmtDT(l.pickupTimestamp||l.timestamp)}</span>
                            </div>
                            <div style={{fontSize:12,color:'#475569',lineHeight:1.4}}>
                              {drugs.map((d,i)=>(
                                <span key={i} style={{display:'inline-block',marginRight:10,marginBottom:2}}>
                                  <span style={{fontWeight:500}}>{d.name?.split(' ').slice(0,3).join(' ')}</span>
                                  {d.qty&&<span style={{color:'#94A3B8'}}> ×{d.qty}</span>}
                                </span>
                              ))}
                            </div>
                            {(l.form?.depTemp||l.depTemp)&&<div style={{fontSize:11,color:'#94A3B8',marginTop:2}}>Dep: {l.form?.depTemp||l.depTemp}°F{(l.form?.arrTemp||l.arrTemp)?` · Arr: ${l.form?.arrTemp||l.arrTemp}°F`:' · Delivery pending'}</div>}
                            {(l.form?.dispStaffName||l.dispStaffName)&&<div style={{fontSize:11,color:'#94A3B8'}}>Staff: {l.form?.dispStaffName||l.dispStaffName}</div>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })
            }

            {selectedLogs.length>0&&(
              <div style={{marginTop:10,padding:'10px 12px',background:'#EFF6FF',borderRadius:9,border:'1px solid #BFDBFE'}}>
                <div style={{fontSize:12,fontWeight:700,color:'#1E40AF'}}>
                  ✓ {selectedLogs.length} log{selectedLogs.length!==1?'s':''} selected — {builtStops.length} stop{builtStops.length!==1?'s':''}, {totalDrugsSelected} drug{totalDrugsSelected!==1?'s':''} total
                </div>
              </div>
            )}
          </div>

          {/* ── ROUTE OPTIMIZER ── */}
          {selectedLogs.length>0&&routeStopKeys.length>0&&(
            <div style={{...S.card,borderLeft:'3px solid #059669'}}>
              <div style={{...S.hdiv,color:'#065F46'}}>🗺 Optimized Delivery Route</div>
              <div style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:6}}>
                <div style={{width:24,height:24,borderRadius:12,background:'#059669',color:'white',fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>🏠</div>
                <div style={{flex:1,paddingTop:2}}>
                  <div style={{fontSize:12,fontWeight:700,color:'#1E293B'}}>Orange City — Origin</div>
                  <div style={{fontSize:11,color:'#64748B'}}>{LOC_DATA['Orange City (Main)'].addr}</div>
                </div>
              </div>
              <div style={{marginLeft:11,width:2,height:8,background:'#D1FAE5',marginBottom:4}}/>
              {orderedKeys.map((key,i)=>{
                const loc=LOC_DATA[key];
                const prev=i===0?LOC_DATA['Orange City (Main)']:LOC_DATA[orderedKeys[i-1]];
                const legMi=loc&&prev?haversineMi(prev,loc):null;
                return(
                  <React.Fragment key={key}>
                    <div style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:6}}>
                      <div style={{width:24,height:24,borderRadius:12,background:'#4C1D95',color:'white',fontSize:12,fontWeight:900,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{i+1}</div>
                      <div style={{flex:1,paddingTop:2}}>
                        <div style={{fontSize:12,fontWeight:700,color:'#1E293B'}}>{key}</div>
                        {loc&&<div style={{fontSize:11,color:'#64748B'}}>{loc.addr}</div>}
                        {legMi&&<div style={{fontSize:11,color:'#059669',fontWeight:600,marginTop:1}}>~{legMi.toFixed(1)} mi from {i===0?'origin':'previous stop'}</div>}
                      </div>
                    </div>
                    {i<orderedKeys.length-1&&<div style={{marginLeft:11,width:2,height:8,background:'#D1FAE5',marginBottom:4}}/>}
                  </React.Fragment>
                );
              })}
              {unknownStops.length>0&&(
                <div style={{marginTop:6,fontSize:11,color:'#D97706',background:'#FEF3C7',padding:'6px 10px',borderRadius:7}}>
                  ⚠️ No coordinates for: {unknownStops.join(', ')}
                </div>
              )}
              {routeResult&&routeResult.totalMi!=null&&(
                <div style={{fontSize:11,color:'#64748B',margin:'10px 0',padding:'7px 10px',background:'#F0FDF4',borderRadius:7,border:'1px solid #BBF7D0'}}>
                  📏 ~{routeResult.totalMi.toFixed(1)} miles total (straight-line)
                </div>
              )}
              <button onClick={()=>openInMaps('Orange City (Main)',orderedKeys)} style={{width:'100%',padding:'13px',background:'linear-gradient(135deg,#059669,#047857)',color:'white',border:'none',borderRadius:10,fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>
                📍 Open in Google Maps
              </button>
              <div style={{fontSize:11,color:'#94A3B8',textAlign:'center',marginTop:6}}>Opens Maps with all stops in optimal order</div>
            </div>
          )}

          {logsForDate.length>0&&(
            <div style={S.card}>
              <div style={S.hdiv}>Dispensing Staff & Signatures</div>
              <FR label="Dispensing Staff (Print Name)" req>
                <TIn value={buildStaff} onChange={v=>setBuildStaff(v)} placeholder="Staff member full name"/>
              </FR>
              <SigPad label="Dispensing Staff Signature" onSave={sig=>setBuildDispSig(sig)} resetKey={sigKey}/>
              <div style={{marginTop:14}}>
                <SigPad label="Driver / Contractor Signature" onSave={sig=>setBuildCtrSig(sig)} resetKey={sigKey}/>
              </div>
              <div style={{display:'flex',gap:8,marginTop:16}}>
                <button onClick={printCompiled} style={{flex:1,padding:'13px',background:selectedLogs.length>0?'#4C1D95':'#E2E8F0',color:selectedLogs.length>0?'white':'#94A3B8',border:'none',borderRadius:10,fontSize:13,fontWeight:700,cursor:selectedLogs.length>0?'pointer':'default',fontFamily:'inherit'}}>
                  🖨 Print Manifest
                </button>
                <button onClick={saveCompiled} style={{flex:1,padding:'13px',background:selectedLogs.length>0?'linear-gradient(135deg,#4C1D95,#6D28D9)':'#E2E8F0',color:selectedLogs.length>0?'white':'#94A3B8',border:'none',borderRadius:10,fontSize:13,fontWeight:700,cursor:selectedLogs.length>0?'pointer':'default',fontFamily:'inherit'}}>
                  💾 Save & Print
                </button>
              </div>
              <div style={{fontSize:11,color:'#94A3B8',textAlign:'center',marginTop:8}}>Print-only doesn't save to History. Save & Print does both.</div>
            </div>
          )}
        </div>
      )}

      {/* ─── MANUAL CHECKLIST ─── */}
      {view==='manual'&&(
        <div style={{padding:'14px'}}>
          {manSaved&&<div style={{background:'#F5F3FF',border:'1px solid #DDD6FE',borderRadius:10,padding:'12px 14px',marginBottom:12,color:'#5B21B6',fontSize:13,fontWeight:600}}>✓ Manifest saved</div>}
          <div style={{background:'#FEF3C7',border:'1px solid #FDE68A',borderRadius:9,padding:'10px 13px',marginBottom:12,fontSize:12,color:'#92400E',lineHeight:1.5}}>
            ℹ️ Use <strong>Build from Logs</strong> to auto-compile from cold chain logs. This tab is for standalone departure checklists.
          </div>
          <div style={S.card}>
            <div style={S.hdiv}>Route</div>
            <FR label="From"><Sel value={f.origin} onChange={v=>set('origin',v)} options={LOCS}/></FR>
            <FR label="Destination" req><Sel value={f.dest} onChange={v=>set('dest',v)} options={['',...LOCS.filter(l=>l!==f.origin)]} ph="Select destination"/></FR>
          </div>
          <div style={S.card}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',...S.hdiv}}>
              <span>Departure Checklist</span>
              <span style={{fontWeight:600,fontSize:13,color:allDone?'#059669':'#F59E0B'}}>{cnt}/{CHECKLIST.length}</span>
            </div>
            {CHECKLIST.map((item,i)=>(
              <div key={i} onClick={()=>toggle(i)} style={{display:'flex',alignItems:'flex-start',gap:10,padding:'11px 12px',borderRadius:9,background:f.checks[i]?'#F5F3FF':'#F8FAFC',cursor:'pointer',border:`1px solid ${f.checks[i]?'#C4B5FD':'#E2E8F0'}`,marginBottom:7}}>
                <div style={{width:20,height:20,borderRadius:5,border:`2px solid ${f.checks[i]?'#7C3AED':'#CBD5E1'}`,background:f.checks[i]?'#7C3AED':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}>
                  {f.checks[i]&&<span style={{color:'white',fontSize:11,fontWeight:900}}>✓</span>}
                </div>
                <div style={{fontSize:12,color:f.checks[i]?'#5B21B6':'#475569',lineHeight:1.5,fontWeight:f.checks[i]?500:400}}>{item}</div>
              </div>
            ))}
          </div>
          <div style={S.card}>
            <div style={S.hdiv}>Signatures</div>
            <FR label="Dispensing Staff (Print Name)" req><TIn value={f.dispStaff} onChange={v=>set('dispStaff',v)} placeholder="Staff member full name"/></FR>
            <SigPad label="Dispensing Staff Signature" onSave={sig=>set('dispSig',sig)} resetKey={manSigKey}/>
            <div style={{marginTop:14}}><SigPad label="Driver / Contractor Signature" onSave={sig=>set('ctrSig',sig)} resetKey={manSigKey}/></div>
            <button onClick={submitManual} style={{...S.btnP,marginTop:16,background:allDone?'linear-gradient(135deg,#4C1D95,#6D28D9)':'#E2E8F0',color:allDone?'white':'#94A3B8',cursor:allDone?'pointer':'default'}}>
              {allDone?'Save Delivery Manifest':`Complete all ${CHECKLIST.length} items to save`}
            </button>
          </div>
        </div>
      )}

      {/* ─── HISTORY ─── */}
      {view==='history'&&(
        <div style={{padding:'14px'}}>
          {manifests.length>0&&(
            <button onClick={()=>exportManifestsCSV(manifests,config?.orgShort)} style={{width:'100%',padding:'10px',background:'white',border:'1px solid #CBD5E1',borderRadius:10,fontSize:12,fontWeight:600,color:'#475569',cursor:'pointer',fontFamily:'inherit',marginBottom:12}}>
              ⬇ Export All CSV
            </button>
          )}
          {manifests.length===0
            ?<div style={{textAlign:'center',padding:'60px 20px',color:'#94A3B8'}}>
                <div style={{fontSize:40,marginBottom:12}}>📋</div>
                <div>No manifests saved yet</div>
              </div>
            :[...manifests].reverse().map(m=>{
              const isCompiled=m.type==='compiled';
              const mTotalDrugs=isCompiled?(m.stops||[]).reduce((a,s)=>a+(s.drugs||[]).length,0):null;
              return(
                <div key={m.id} style={{background:'white',borderRadius:12,padding:'14px',marginBottom:10,boxShadow:'0 1px 3px rgba(0,0,0,0.05)',borderLeft:`3px solid ${isCompiled?'#0369A1':'#7C3AED'}`}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',gap:6,alignItems:'center',marginBottom:4,flexWrap:'wrap'}}>
                        <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:20,background:isCompiled?'#EFF6FF':'#F5F3FF',color:isCompiled?'#1E40AF':'#5B21B6'}}>
                          {isCompiled?'📦 Compiled':'📋 Manual'}
                        </span>
                      </div>
                      <div style={{fontSize:13,fontWeight:700,color:'#1E293B'}}>
                        {isCompiled?`${m.origin||'Orange City'} → ${(m.stops||[]).length} stop${(m.stops||[]).length!==1?'s':''}`:`${m.origin} → ${m.dest}`}
                      </div>
                      <div style={{fontSize:12,color:'#475569',marginTop:2}}>{fmtDT(m.timestamp)}</div>
                      {isCompiled&&<div style={{fontSize:12,color:'#475569',marginTop:1}}>{mTotalDrugs} drug{mTotalDrugs!==1?'s':''} · {m.dispStaff||'—'}</div>}
                      {!isCompiled&&<div style={{fontSize:11,color:'#7C3AED',marginTop:3,fontWeight:600}}>{Object.values(m.checks||{}).filter(Boolean).length}/{CHECKLIST.length} verified ✓</div>}
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:6,flexShrink:0,marginLeft:8}}>
                      <button onClick={()=>printManifest(m,config?.orgName)} style={{background:'#4C1D95',border:'none',borderRadius:7,color:'white',fontSize:11,fontWeight:600,padding:'6px 10px',cursor:'pointer',fontFamily:'inherit'}}>🖨 Print</button>
                      <button onClick={()=>onDel(m.id)} style={{background:'none',border:'1px solid #FECACA',borderRadius:7,color:'#EF4444',cursor:'pointer',fontSize:11,padding:'5px 10px',fontFamily:'inherit'}}>Delete</button>
                    </div>
                  </div>
                  {isCompiled&&(m.stops||[]).map((s,i)=>(
                    <div key={i} style={{marginTop:6,padding:'7px 10px',background:'#F8FAFC',borderRadius:7,fontSize:11,color:'#475569'}}>
                      <span style={{fontWeight:600,color:'#1E293B'}}>Stop {i+1}: {s.dest||s.location}</span>
                      {' — '}{(s.drugs||[]).map(d=>d.name?.split(' ').slice(0,2).join(' ')).join(', ')}
                    </div>
                  ))}
                </div>
              );
            })
          }
        </div>
      )}
    </div>
  );
}
